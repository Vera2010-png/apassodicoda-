<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect, useMemo, useCallback} = React;

// ---------- CATEGORIZZAZIONE CAMPIONATI ----------
const CATEGORY_RULES = [
  { name: "Coppe internazionali", test: k => /uefa|champs_league|europa_league|conference_league|libertadores|sudamericana|world_cup|nations_league|euro_|copa_america|caribbean|concacaf|afc_champions|fifa_club_world_cup/.test(k) },
  { name: "Italia", test: k => /italy/.test(k) },
  { name: "Europa (big 5 + altri)", test: k => /england|epl|spain|la_liga|germany|bundesliga|france|ligue_one|portugal|netherlands|belgium|scotland|turkey|greece|austria|switzerland|russia|poland/.test(k) },
  { name: "Nord Europa", test: k => /norway|sweden|denmark|finland|iceland/.test(k) },
  { name: "Sud America", test: k => /brazil|argentina|chile|colombia|peru|uruguay|ecuador|paraguay|venezuela|bolivia|conmebol/.test(k) },
  { name: "Resto del mondo", test: () => true },
];
function categoryFor(key){
  for(const r of CATEGORY_RULES){ if(r.test(key)) return r.name; }
  return "Resto del mondo";
}
function groupByCategory(sports){
  const groups = {};
  sports.forEach(s=>{
    const cat = categoryFor(s.key);
    if(!groups[cat]) groups[cat] = [];
    groups[cat].push(s);
  });
  const order = CATEGORY_RULES.map(r=>r.name);
  return order.filter(o=>groups[o]).map(o=>({name:o, items:groups[o]}));
}

// ---------- DEMO DATA ----------
const DEMO_SPORTS = [
  {key:"soccer_italy_serie_a", title:"Serie A", group:"Soccer"},
  {key:"soccer_uefa_champs_league", title:"Champions League", group:"Soccer"},
  {key:"soccer_uefa_europa_league", title:"Europa League", group:"Soccer"},
  {key:"soccer_epl", title:"Premier League", group:"Soccer"},
  {key:"soccer_spain_la_liga", title:"La Liga", group:"Soccer"},
  {key:"soccer_germany_bundesliga", title:"Bundesliga", group:"Soccer"},
  {key:"soccer_norway_eliteserien", title:"Eliteserien (Norvegia)", group:"Soccer"},
  {key:"soccer_sweden_allsvenskan", title:"Allsvenskan (Svezia)", group:"Soccer"},
  {key:"soccer_brazil_campeonato", title:"Brasileirão", group:"Soccer"},
  {key:"soccer_argentina_primera_division", title:"Primera División (Argentina)", group:"Soccer"},
  {key:"soccer_conmebol_copa_libertadores", title:"Copa Libertadores", group:"Soccer"},
];
function demoOdds(){
  const mk = (home, away, books) => ({ id: home+away+Math.random(), home_team:home, away_team:away,
    commence_time: new Date(Date.now()+1000*60*60*24*(1+Math.random()*3)).toISOString(), bookmakers: books });
  const book = (title, h,d,a) => ({ title, markets:[{key:"h2h", outcomes:[
    {name:"home", price:h}, {name:"draw", price:d}, {name:"away", price:a}
  ]}]});
  return [
    mk("Inter","Juventus",[ book("Bet365",1.85,3.60,4.20), book("Sisal",1.90,3.55,4.10), book("Snai",1.78,3.70,4.40), book("Goldbet",2.05,3.50,3.90), book("Betflag",1.88,3.58,4.15) ]),
    mk("Milan","Napoli",[ book("Bet365",2.60,3.20,2.75), book("Sisal",2.55,3.30,2.70), book("Snai",2.70,3.10,2.65), book("Goldbet",2.50,3.35,2.90), book("Betflag",2.62,3.22,2.72) ]),
    mk("Atalanta","Roma",[ book("Bet365",2.10,3.30,3.50), book("Sisal",2.15,3.25,3.40), book("Snai",2.05,3.35,3.65), book("Goldbet",2.20,3.20,3.30), book("Betflag",2.12,3.28,3.45) ]),
    mk("Rosenborg","Bodø/Glimt",[ book("Bet365",3.10,3.40,2.15), book("Unibet",3.00,3.50,2.20), book("Betsson",3.20,3.30,2.10) ]),
    mk("Flamengo","Palmeiras",[ book("Bet365",2.30,3.10,3.20), book("Betano",2.25,3.15,3.30), book("Sportingbet",2.35,3.05,3.10) ]),
    mk("River Plate","Boca Juniors",[ book("Bet365",2.40,3.00,3.10), book("Betano",2.45,2.95,3.15), book("Codere",2.35,3.05,3.20) ]),
  ];
}

// ---------- LOGICA QUOTE ----------
function analyzeMatch(m){
  const outcomes = {home:[], draw:[], away:[]};
  m.bookmakers.forEach(bk=>{
    const mkt = bk.markets.find(x=>x.key==="h2h");
    if(!mkt) return;
    mkt.outcomes.forEach(o=>{
      let side = null;
      if(o.name === m.home_team || o.name==="home") side="home";
      else if(o.name === m.away_team || o.name==="away") side="away";
      else side="draw";
      outcomes[side].push({book:bk.title, price:o.price});
    });
  });
  if(!outcomes.home.length || !outcomes.away.length || !outcomes.draw.length) return null;

  const best = {};
  ["home","draw","away"].forEach(k=>{ best[k] = outcomes[k].reduce((a,b)=> b.price>a.price ? b : a); });

  const arbSum = 1/best.home.price + 1/best.draw.price + 1/best.away.price;
  const isArb = arbSum < 1;
  const arbProfitPct = isArb ? (1/arbSum - 1) * 100 : 0;

  const avg = {};
  ["home","draw","away"].forEach(k=>{ avg[k] = outcomes[k].reduce((s,x)=>s+x.price,0)/outcomes[k].length; });

  // Probabilità "fair" stimata: implicita dalla media di mercato, corretta per il margine (devig)
  const impliedRaw = { home: 1/avg.home, draw: 1/avg.draw, away: 1/avg.away };
  const overround = impliedRaw.home + impliedRaw.draw + impliedRaw.away;
  const fairProb = { home: impliedRaw.home/overround, draw: impliedRaw.draw/overround, away: impliedRaw.away/overround };

  // Value: expected value positivo = price * fairProb - 1
  const valueHits = [];
  ["home","draw","away"].forEach(k=>{
    outcomes[k].forEach(o=>{
      const ev = (o.price * fairProb[k] - 1) * 100;
      if(ev >= 3){ valueHits.push({side:k, book:o.book, price:o.price, fairProb:fairProb[k], ev}); }
    });
  });
  valueHits.sort((a,b)=>b.ev-a.ev);

  return { match:m, outcomes, best, avg, fairProb, isArb, arbProfitPct, valueHits };
}

function stakesForArb(best, total=100){
  const invSum = 1/best.home.price + 1/best.draw.price + 1/best.away.price;
  return {
    home: (total * (1/best.home.price) / invSum).toFixed(2),
    draw: (total * (1/best.draw.price) / invSum).toFixed(2),
    away: (total * (1/best.away.price) / invSum).toFixed(2),
  };
}

const LABELS = {home:"1 (Casa)", draw:"X (Pareggio)", away:"2 (Trasferta)"};

// ---------- COSTRUTTORE SCHEDINE ----------
function buildSlip(analyzed, profile, size){
  // Per ogni partita analizzata, prendo la migliore selezione secondo il profilo scelto
  const candidates = [];
  analyzed.forEach(a=>{
    ["home","draw","away"].forEach(k=>{
      const price = a.best[k].price;
      const fp = a.fairProb[k];
      const ev = (price*fp - 1)*100;
      let score;
      if(profile==="sicura") score = fp;
      else if(profile==="aggressiva") score = ev;
      else score = fp*0.55 + Math.max(ev,0)/100*0.45; // bilanciata
      candidates.push({ match:a.match, side:k, price, fairProb:fp, ev, book:a.best[k].book, score });
    });
  });
  candidates.sort((a,b)=>b.score-a.score);
  // Una sola selezione per partita, evitando doppioni
  const seen = new Set();
  const picks = [];
  for(const c of candidates){
    if(seen.has(c.match.id)) continue;
    if(profile==="sicura" && c.fairProb < 0.4) continue;
    if(profile!=="sicura" && c.ev <= 0) continue;
    picks.push(c); seen.add(c.match.id);
    if(picks.length===size) break;
  }
  if(picks.length < size) return null;
  const combinedOdds = picks.reduce((p,c)=>p*c.price,1);
  const combinedProb = picks.reduce((p,c)=>p*c.fairProb,1);
  return { picks, combinedOdds, combinedProb };
}

function App(){
  const [apiKey, setApiKey] = useState("");
  const [region, setRegion] = useState("eu");
  const [sports, setSports] = useState(DEMO_SPORTS);
  const [selected, setSelected] = useState(DEMO_SPORTS.map(s=>s.key));
  const [matches, setMatches] = useState(demoOdds());
  const [loading, setLoading] = useState(false);
  const [loadingSports, setLoadingSports] = useState(false);
  const [error, setError] = useState("");
  const [tab, setTab] = useState("arb");
  const [lastScan, setLastScan] = useState(new Date());
  const [slipProfile, setSlipProfile] = useState("bilanciata");
  const [slipSize, setSlipSize] = useState(3);
  const [debugLog, setDebugLog] = useState([]);
  const [showDebug, setShowDebug] = useState(false);
  const isDemo = apiKey.trim().length === 0;

  const categories = useMemo(()=>groupByCategory(sports), [sports]);

  const loadSports = useCallback(async ()=>{
    if(isDemo){ setSports(DEMO_SPORTS); setSelected(DEMO_SPORTS.map(s=>s.key)); return; }
    setLoadingSports(true); setError("");
    try{
      const res = await fetch(`https://api.the-odds-api.com/v4/sports?apiKey=${encodeURIComponent(apiKey)}`);
      if(!res.ok) throw new Error("Chiave non valida o quota esaurita ("+res.status+")");
      const data = await res.json();
      const soccer = data.filter(s=>s.group==="Soccer" && !s.key.includes("outrights"));
      setSports(soccer);
      setSelected(soccer.map(s=>s.key));
    }catch(e){ setError(e.message); }
    setLoadingSports(false);
  },[apiKey, isDemo]);

  const runScan = useCallback(async ()=>{
    if(isDemo){ setMatches(demoOdds()); setLastScan(new Date()); setDebugLog([]); return; }
    if(selected.length===0){ setError("Seleziona almeno un campionato."); return; }
    setLoading(true); setError("");
    const log = [];
    try{
      const results = [];
      for(const key of selected){
        const url = `https://api.the-odds-api.com/v4/sports/${key}/odds?apiKey=${encodeURIComponent(apiKey)}&regions=${region}&markets=h2h&oddsFormat=decimal`;
        try{
          const res = await fetch(url);
          if(!res.ok){
            let detail = String(res.status);
            try{ const errBody = await res.json(); if(errBody && errBody.message) detail += " — " + errBody.message; }catch(_e){}
            log.push({key, status:"errore "+detail, count:0});
            continue;
          }
          const data = await res.json();
          log.push({key, status:"ok", count:data.length});
          results.push(...data);
        }catch(inner){
          log.push({key, status:"errore rete: "+inner.message, count:0});
        }
      }
      setMatches(results);
      setLastScan(new Date());
      setDebugLog(log);
      if(results.length===0) setError("Nessuna partita trovata per i campionati selezionati in questo momento. Guarda il dettaglio scansione qui sotto per capire il motivo campionato per campionato.");
    }catch(e){ setError("Errore durante il recupero delle quote: "+e.message); }
    setLoading(false);
  },[apiKey, region, selected, isDemo]);

  const toggleLeague = (key)=>{
    setSelected(prev => prev.includes(key) ? prev.filter(k=>k!==key) : [...prev, key]);
  };
  const toggleCategory = (items, allOn)=>{
    const keys = items.map(i=>i.key);
    setSelected(prev => allOn ? prev.filter(k=>!keys.includes(k)) : Array.from(new Set([...prev, ...keys])));
  };
  const selectAll = ()=> setSelected(sports.map(s=>s.key));
  const selectNone = ()=> setSelected([]);

  const analyzed = useMemo(()=> matches.map(analyzeMatch).filter(Boolean), [matches]);
  const arbs = useMemo(()=> analyzed.filter(a=>a.isArb).sort((a,b)=>b.arbProfitPct-a.arbProfitPct), [analyzed]);
  const values = useMemo(()=> analyzed.filter(a=>a.valueHits.length>0), [analyzed]);
  const slip = useMemo(()=> buildSlip(analyzed, slipProfile, slipSize), [analyzed, slipProfile, slipSize]);

  return (
    <div className="app">
      <div className="header">
        <div>
          <div className="brand-eyebrow">Segnali quote &middot; calcio</div>
          <h1 className="brand-title">Odds <span>Scanner</span></h1>
        </div>
        <div className="scan-status">
          {isDemo ? <span className="demo-tag">Dati demo</span> :
            <>Ultima scansione<br/><b>{lastScan.toLocaleTimeString("it-IT")}</b></>}
        </div>
      </div>

      <div className="panel">
        <p className="panel-title">Configurazione</p>
        <div className="config-grid">
          <div>
            <label>API key (The Odds API)</label>
            <input type="password" placeholder="Incolla qui la tua key — lascia vuoto per la demo"
              value={apiKey} onChange={e=>setApiKey(e.target.value)} />
          </div>
          <div>
            <label>Regione bookmaker</label>
            <select value={region} onChange={e=>setRegion(e.target.value)}>
              <option value="eu">Europa</option>
              <option value="uk">Regno Unito</option>
              <option value="us">USA</option>
              <option value="au">Australia</option>
            </select>
          </div>
          <div>
            <label>Soglia value bet</label>
            <select disabled><option>EV &ge; +3% sulla probabilità fair</option></select>
          </div>
        </div>

        <div className="leagues-box">
          <div className="cat-head">
            <label style={{margin:0}}>Campionati {isDemo ? "(demo)" : `(${selected.length}/${sports.length} selezionati)`}</label>
            {!isDemo && <div>
              <button className="cat-toggle" onClick={selectAll}>Seleziona tutti</button>
              <button className="cat-toggle" onClick={selectNone}>Deseleziona tutti</button>
            </div>}
          </div>
          {categories.map(cat=>{
            const allOn = cat.items.every(i=>selected.includes(i.key));
            return (
              <div className="cat-block" key={cat.name}>
                <div className="cat-head">
                  <span className="cat-name">{cat.name} ({cat.items.length})</span>
                  <button className="cat-toggle" onClick={()=>toggleCategory(cat.items, allOn)}>{allOn ? "Rimuovi" : "Aggiungi tutti"}</button>
                </div>
                <div className="leagues-list">
                  {cat.items.map(s=>(
                    <div key={s.key} className={"league-chip"+(selected.includes(s.key)?" on":"")}
                      onClick={()=>toggleLeague(s.key)}>{s.title}</div>
                  ))}
                </div>
              </div>
            );
          })}
        </div>

        <div className="btn-row">
          <button onClick={loadSports} disabled={loadingSports || isDemo}>
            {loadingSports ? "Carico…" : "Aggiorna elenco campionati"}
          </button>
          <button className="primary" onClick={runScan} disabled={loading}>
            {loading ? "Scansione in corso…" : "Scansiona quote"}
          </button>
        </div>
        <p className="hint">
          {isDemo
            ? <>Stai vedendo dati di esempio con alcuni campionati di ogni area (Europa, Nord Europa, Sud America, coppe). Registrati su <a href="https://the-odds-api.com" target="_blank" rel="noopener">the-odds-api.com</a> e incolla la tua key sopra per caricare <b>tutti</b> i campionati realmente offerti dai bookmaker.</>
            : "Ogni scansione consuma una richiesta di quota per ogni campionato selezionato: con molti campionati (tutti i continenti) puoi esaurire rapidamente il piano gratuito da 500/mese."}
        </p>
        {error && <p className="hint" style={{color:"var(--bad)"}}>{error}</p>}
        {!isDemo && debugLog.length>0 && (
          <div style={{marginTop:14}}>
            <button className="cat-toggle" onClick={()=>setShowDebug(s=>!s)}>
              {showDebug ? "Nascondi dettaglio scansione" : "Mostra dettaglio scansione ("+debugLog.length+" campionati)"}
            </button>
            {showDebug && (
              <table style={{marginTop:10}}>
                <thead><tr><th>Campionato (key API)</th><th>Esito</th><th>Eventi trovati</th></tr></thead>
                <tbody>
                  {debugLog.map((d,i)=>(
                    <tr key={i}>
                      <td>{d.key}</td>
                      <td style={{color: d.status==="ok" ? "var(--arb)" : "var(--bad)"}}>{d.status}</td>
                      <td>{d.count}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            )}
          </div>
        )}
      </div>

      <div className="tabs">
        <div className={"tab"+(tab==="arb"?" active":"")} onClick={()=>setTab("arb")}>Arbitraggi <span className="count">{arbs.length}</span></div>
        <div className={"tab"+(tab==="value"?" active":"")} onClick={()=>setTab("value")}>Value bet <span className="count">{values.length}</span></div>
        <div className={"tab"+(tab==="slip"?" active":"")} onClick={()=>setTab("slip")}>Schedine proposte</div>
        <div className={"tab"+(tab==="board"?" active":"")} onClick={()=>setTab("board")}>Tabellone completo <span className="count">{analyzed.length}</span></div>
      </div>

      {tab==="arb" && (
        arbs.length===0 ? <div className="empty">Nessun arbitraggio trovato in questa scansione.</div> :
        arbs.map(a=>{
          const stakes = stakesForArb(a.best);
          return (
            <div className="card arb" key={a.match.id}>
              <div className="card-top">
                <div>
                  <div className="match-name">{a.match.home_team} — {a.match.away_team}</div>
                  <div className="match-meta">{new Date(a.match.commence_time).toLocaleString("it-IT")}</div>
                </div>
                <div className="edge-badge arb">+{a.arbProfitPct.toFixed(2)}% garantito</div>
              </div>
              <div className="outcomes">
                {["home","draw","away"].map(k=>(
                  <div className="outcome" key={k}>
                    <div className="outcome-label">{LABELS[k]}</div>
                    <div className="outcome-odds">{a.best[k].price.toFixed(2)}</div>
                    <div className="outcome-book">{a.best[k].book}</div>
                  </div>
                ))}
              </div>
              <div className="stake-line">
                Su una puntata totale di 100€: 1 → {stakes.home}€ &nbsp;|&nbsp; X → {stakes.draw}€ &nbsp;|&nbsp; 2 → {stakes.away}€ (da piazzare sui rispettivi bookmaker sopra)
              </div>
            </div>
          );
        })
      )}

      {tab==="value" && (
        values.length===0 ? <div className="empty">Nessuna quota con valore atteso positivo in questa scansione.</div> :
        values.map(a=>(
          <div className="card value" key={a.match.id}>
            <div className="card-top">
              <div>
                <div className="match-name">{a.match.home_team} — {a.match.away_team}</div>
                <div className="match-meta">{new Date(a.match.commence_time).toLocaleString("it-IT")}</div>
              </div>
              <div className="edge-badge value">{a.valueHits.length} segnale{a.valueHits.length>1?"i":""}</div>
            </div>
            <div className="outcomes">
              {a.valueHits.slice(0,3).map((v,i)=>(
                <div className="outcome hit" key={i}>
                  <div className="outcome-label">{LABELS[v.side]}</div>
                  <div className="outcome-odds">{v.price.toFixed(2)} <span style={{fontSize:11,color:"var(--muted)"}}>(EV +{v.ev.toFixed(1)}%)</span></div>
                  <div className="outcome-book">{v.book} · prob. fair {(v.fairProb*100).toFixed(0)}%</div>
                </div>
              ))}
            </div>
          </div>
        ))
      )}

      {tab==="slip" && (
        <div className="panel">
          <p className="panel-title">Costruttore schedine</p>
          <div className="slip-controls">
            <div>
              <label>Profilo</label>
              <select value={slipProfile} onChange={e=>setSlipProfile(e.target.value)}>
                <option value="sicura">Sicura (probabilità alta)</option>
                <option value="bilanciata">Bilanciata</option>
                <option value="aggressiva">Aggressiva (valore atteso alto)</option>
              </select>
            </div>
            <div>
              <label>Numero di selezioni</label>
              <select value={slipSize} onChange={e=>setSlipSize(Number(e.target.value))}>
                <option value={2}>2</option><option value={3}>3</option>
                <option value={4}>4</option><option value={5}>5</option>
              </select>
            </div>
          </div>

          {!slip ? <div className="empty">Non ci sono abbastanza partite adatte a questo profilo nella scansione corrente. Prova a scansionare più campionati o riduci il numero di selezioni.</div> : (
            <div className="card slip">
              <div className="card-top">
                <div className="match-name">Schedina proposta — {slipSize} selezioni ({slipProfile})</div>
                <div className="edge-badge slip">Quota totale {slip.combinedOdds.toFixed(2)}</div>
              </div>
              {slip.picks.map((p,i)=>(
                <div className="slip-row" key={i}>
                  <div>
                    <div className="m">{p.match.home_team} — {p.match.away_team}</div>
                    <div className="meta">{LABELS[p.side]} · {p.book} · prob. fair {(p.fairProb*100).toFixed(0)}%</div>
                  </div>
                  <div className="meta">quota {p.price.toFixed(2)} {p.ev>0 && <span style={{color:"var(--value)"}}> · EV +{p.ev.toFixed(1)}%</span>}</div>
                </div>
              ))}
              <div className="slip-summary">
                <div>Quota combinata<b>{slip.combinedOdds.toFixed(2)}</b></div>
                <div>Probabilità stimata (fair, indipendenza)<b>{(slip.combinedProb*100).toFixed(1)}%</b></div>
                <div>Vincita su 10€<b>{(slip.combinedOdds*10).toFixed(2)}€</b></div>
              </div>
            </div>
          )}
          <p className="hint">
            La "probabilità stimata" è calcolata togliendo il margine del bookmaker dalle quote medie di mercato (devig) e assumendo che le partite selezionate siano indipendenti tra loro — è una stima statistica, non una previsione certa. Più selezioni aggiungi, più la quota sale ma più la probabilità reale di indovinarle tutte scende.
          </p>
        </div>
      )}

      {tab==="board" && (
        <div className="panel board">
          <table>
            <thead><tr><th>Partita</th><th>1 miglior quota</th><th>X miglior quota</th><th>2 miglior quota</th><th>Bookmaker consultati</th></tr></thead>
            <tbody>
              {analyzed.map(a=>(
                <tr key={a.match.id}>
                  <td>{a.match.home_team} - {a.match.away_team}</td>
                  <td className="best">{a.best.home.price.toFixed(2)} <span style={{color:"var(--muted)"}}>({a.best.home.book})</span></td>
                  <td className="best">{a.best.draw.price.toFixed(2)} <span style={{color:"var(--muted)"}}>({a.best.draw.book})</span></td>
                  <td className="best">{a.best.away.price.toFixed(2)} <span style={{color:"var(--muted)"}}>({a.best.away.book})</span></td>
                  <td>{a.match.bookmakers.length}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      <div className="footer-note">
        Strumento di analisi quote, non un consiglio di investimento. Probabilità e arbitraggi sono calcolati sui dati ricevuti dall'API e possono cambiare prima del piazzamento; verifica sempre le quote direttamente sul sito del bookmaker.<br/>
        Il gioco d'azzardo può causare dipendenza patologica — gioca con responsabilità.
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
