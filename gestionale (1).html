<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🐾 Gestionale — A Passo di Coda</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#1A1410;color:#F5EDE3;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:#1A1410}
  ::-webkit-scrollbar-thumb{background:#3D2E1E;border-radius:3px}
  select option{background:#1A1410;color:#F5EDE3}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const KEYS = { products:"apc_products", sales:"apc_sales", expenses:"apc_expenses", settings:"apc_settings" };
const load = (k) => { try { return JSON.parse(localStorage.getItem(k)) || null; } catch { return null; } };
const save = (k, v) => localStorage.setItem(k, JSON.stringify(v));

// IVA default per categoria
const ivaForCategory = (cat) => (cat||"").toUpperCase().includes("BARF") ? 10 : 22;

const SAMPLE_PRODUCTS = [
  { id:"1", name:"Crocchette Premium Pollo 3kg", barcode:"8001234567890", buyPrice:12.50, sellPrice:22.90, stock:15, minStock:5, category:"Cibo secco", iva:22 },
  { id:"2", name:"Cibo umido Vitello 400g", barcode:"8009876543210", buyPrice:1.80, sellPrice:3.50, stock:40, minStock:12, category:"Cibo umido", iva:22 },
  { id:"3", name:"Snack naturale manzo", barcode:"8005551234567", buyPrice:4.20, sellPrice:8.90, stock:22, minStock:8, category:"Snack", iva:22 },
  { id:"4", name:"Barf Manzo 500g (Italia Pet Food)", barcode:"", buyPrice:3.10, sellPrice:6.50, stock:18, minStock:6, category:"BARF", iva:10 },
  { id:"5", name:"Pettorina comfort taglia M", barcode:"8007778889990", buyPrice:11.00, sellPrice:24.90, stock:8, minStock:3, category:"Accessori", iva:22 },
];
const SAMPLE_EXPENSES = [
  { id:"e1", month:"2026-05", label:"Affitto", amount:850 },
  { id:"e2", month:"2026-05", label:"Utenze (luce/gas)", amount:180 },
  { id:"e3", month:"2026-06", label:"Affitto", amount:850 },
  { id:"e4", month:"2026-06", label:"Utenze (luce/gas)", amount:160 },
];

const fmt = (n) => new Intl.NumberFormat("it-IT",{style:"currency",currency:"EUR"}).format(n||0);
const nowISO = () => new Date().toISOString();
const thisMonth = () => new Date().toISOString().slice(0,7);
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,6);

// Dato prezzo IVA inclusa, estrae imponibile e IVA
const scorporaIva = (prezzoIvato, aliquota) => {
  const imponibile = prezzoIvato / (1 + aliquota / 100);
  const iva = prezzoIvato - imponibile;
  return { imponibile, iva };
};

const iStyle = { background:"#1A1410", border:"1px solid #3D2E1E", borderRadius:8, padding:"8px 12px", color:"#F5EDE3", fontSize:13, outline:"none", width:"100%", boxSizing:"border-box" };

function StatCard({label,value,sub,color,icon}){
  return (
    <div style={{background:"#231A12",border:"1px solid #3D2E1E",borderRadius:12,padding:"14px 16px"}}>
      <div style={{display:"flex",alignItems:"center",gap:6,color:"#A08060",fontSize:12,marginBottom:6}}>{icon}<span>{label}</span></div>
      <div style={{fontSize:22,fontWeight:800,color:color||"#F5EDE3"}}>{value}</div>
      {sub&&<div style={{fontSize:11,color:"#A08060",marginTop:3}}>{sub}</div>}
    </div>
  );
}

// ─── DASHBOARD ───────────────────────────────────────────────────────────────
function Dashboard({products,sales,expenses,getSalesThisMonth,getSalesByProduct}){
  const m = thisMonth();
  const salesMonth = getSalesThisMonth();
  const salesMap = getSalesByProduct(m);

  // Calcoli con IVA scorporata
  let totalLordo=0, totalImponibile=0, totalIvaCollettata=0, totalCostGoods=0;
  salesMonth.forEach(s => {
    const lordo = s.qty * s.sellPrice;
    const { imponibile, iva } = scorporaIva(lordo, s.iva||22);
    totalLordo += lordo;
    totalImponibile += imponibile;
    totalIvaCollettata += iva;
    totalCostGoods += s.qty * s.buyPrice;
  });
  const grossMargin = totalImponibile - totalCostGoods;
  const totalExpenses = expenses.filter(e=>e.month===m).reduce((a,e)=>a+e.amount,0);
  const netResult = grossMargin - totalExpenses;

  const lowStock = products.filter(p=>p.stock<=(p.minStock||0));
  const outOfStock = products.filter(p=>p.stock===0);
  const topProducts = Object.entries(salesMap).map(([id,d])=>({product:products.find(p=>p.id===id),...d})).filter(x=>x.product).sort((a,b)=>b.revenue-a.revenue).slice(0,5);

  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:12}}>
        <StatCard label="Incassato (IVA incl.)" value={fmt(totalLordo)} sub={salesMonth.length+" vendite"} color="#D96C05" icon="💰"/>
        <StatCard label="Fatturato netto (impon.)" value={fmt(totalImponibile)} sub={"IVA collettata: "+fmt(totalIvaCollettata)} color="#F28C35" icon="🧾"/>
        <StatCard label="Margine lordo" value={fmt(grossMargin)} sub={(totalImponibile>0?((grossMargin/totalImponibile)*100).toFixed(1):0)+"% sull'imponibile"} color={grossMargin>=0?"#5CB85C":"#E05252"} icon="📈"/>
        <StatCard label="Spese mese" value={fmt(totalExpenses)} sub="costi fissi" color="#E8C44A" icon="💳"/>
        <StatCard label="Risultato netto" value={fmt(netResult)} sub={netResult>=0?"✅ In positivo":"⚠️ In negativo"} color={netResult>=0?"#5CB85C":"#E05252"} icon="🏁"/>
        <StatCard label="IVA da versare" value={fmt(totalIvaCollettata)} sub="da tenere da parte" color="#A78BFA" icon="🏛️"/>
      </div>

      {(lowStock.length>0||outOfStock.length>0)&&(
        <div style={{background:"#2E1A0E",border:"1px solid #7A3B0A",borderRadius:12,padding:14}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,color:"#F28C35",fontWeight:700,fontSize:14}}>⚠️ Allerte Scorte</div>
          {outOfStock.map(p=>(
            <div key={p.id} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid #3D2E1E",fontSize:13}}>
              <span>{p.name}</span><span style={{color:"#E05252",fontWeight:700}}>ESAURITO</span>
            </div>
          ))}
          {lowStock.filter(p=>p.stock>0).map(p=>(
            <div key={p.id} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid #3D2E1E",fontSize:13}}>
              <span>{p.name}</span><span style={{color:"#E8C44A"}}>Solo {p.stock} pz (min: {p.minStock})</span>
            </div>
          ))}
        </div>
      )}

      {topProducts.length>0&&(
        <div style={{background:"#231A12",border:"1px solid #3D2E1E",borderRadius:12,padding:16}}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:12,color:"#D96C05"}}>🏆 Top Prodotti del Mese</div>
          {topProducts.map((t,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 0",borderBottom:"1px solid #3D2E1E",fontSize:13}}>
              <span style={{color:"#A08060",width:20}}>#{i+1}</span>
              <span style={{flex:1}}>{t.product.name}</span>
              <span style={{color:"#A08060"}}>{t.qty} pz</span>
              <span style={{fontWeight:700,color:"#D96C05"}}>{fmt(t.revenue)}</span>
            </div>
          ))}
        </div>
      )}

      {salesMonth.length===0&&(
        <div style={{textAlign:"center",padding:40,color:"#A08060",fontSize:14}}>
          Nessuna vendita registrata questo mese.<br/>Vai in <strong style={{color:"#D96C05"}}>Cassa / Vendite</strong> per iniziare!
        </div>
      )}
    </div>
  );
}

// ─── CASSA ───────────────────────────────────────────────────────────────────
function Cassa({products,setProducts,sales,setSales}){
  const [barcodeInput,setBarcodeInput]=useState("");
  const [cart,setCart]=useState([]);
  const [searchQ,setSearchQ]=useState("");
  const [msg,setMsg]=useState(null);
  const barcodeRef=useRef(null);
  useEffect(()=>{barcodeRef.current?.focus();},[]);

  const showMsg=(text,type="ok")=>{setMsg({text,type});setTimeout(()=>setMsg(null),2500);};

  const addToCart=(product,qty=1)=>{
    if(product.stock<qty){showMsg("Stock insufficiente ("+product.stock+" disponibili)","err");return;}
    setCart(prev=>{
      const existing=prev.find(i=>i.id===product.id);
      if(existing)return prev.map(i=>i.id===product.id?{...i,qty:i.qty+qty}:i);
      return[...prev,{...product,qty}];
    });
    showMsg("✓ "+product.name+" aggiunto","ok");
  };

  const handleBarcode=(e)=>{
    if(e.key==="Enter"){
      const code=barcodeInput.trim();
      if(!code)return;
      const p=products.find(x=>x.barcode===code);
      if(p){addToCart(p);setBarcodeInput("");}
      else showMsg("Codice non trovato: "+code,"err");
    }
  };

  // Calcoli carrello con IVA
  const cartRows = cart.map(item => {
    const lordo = item.qty * item.sellPrice;
    const { imponibile, iva } = scorporaIva(lordo, item.iva||22);
    return { ...item, lordo, imponibile, iva };
  });
  const cartLordo = cartRows.reduce((a,r)=>a+r.lordo,0);
  const cartImponibile = cartRows.reduce((a,r)=>a+r.imponibile,0);
  const cartIva = cartRows.reduce((a,r)=>a+r.iva,0);

  // IVA raggruppata per aliquota
  const ivaGroups = {};
  cartRows.forEach(r=>{
    const k = r.iva||22;
    if(!ivaGroups[k]) ivaGroups[k]={base:0,iva:0};
    ivaGroups[k].base += r.imponibile;
    ivaGroups[k].iva += r.iva;
  });

  const confirmSale=()=>{
    if(cart.length===0)return;
    const now=nowISO();
    const newSales=cart.map(item=>({
      id:uid(), productId:item.id, qty:item.qty,
      sellPrice:item.sellPrice, buyPrice:item.buyPrice,
      iva:item.iva||22, date:now, name:item.name
    }));
    setSales(prev=>[...prev,...newSales]);
    setProducts(prev=>prev.map(p=>{const ci=cart.find(c=>c.id===p.id);return ci?{...p,stock:p.stock-ci.qty}:p;}));
    setCart([]);
    showMsg("✅ Vendita registrata! Totale: "+fmt(cartLordo),"ok");
  };

  const filteredProducts=products.filter(p=>p.name.toLowerCase().includes(searchQ.toLowerCase())||p.barcode?.includes(searchQ));
  const recentSales=[...sales].reverse().slice(0,15);

  return (
    <div style={{display:"grid",gridTemplateColumns:"1fr 340px",gap:16}}>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        {/* Scanner */}
        <div style={{background:"#231A12",border:"2px solid #D96C05",borderRadius:12,padding:14}}>
          <div style={{fontSize:12,color:"#A08060",marginBottom:6}}>📡 Scansiona o inserisci codice a barre (premi Invio)</div>
          <input ref={barcodeRef} value={barcodeInput} onChange={e=>setBarcodeInput(e.target.value)} onKeyDown={handleBarcode}
            placeholder="Punta il lettore qui oppure digita il codice..."
            style={{...iStyle,fontSize:15}} autoComplete="off"/>
          {msg&&<div style={{marginTop:8,padding:"6px 10px",borderRadius:6,background:msg.type==="ok"?"#1E3A1E":"#3A1E1E",color:msg.type==="ok"?"#5CB85C":"#E05252",fontSize:13}}>{msg.text}</div>}
        </div>

        {/* Ricerca manuale */}
        <div style={{background:"#231A12",border:"1px solid #3D2E1E",borderRadius:12,padding:14}}>
          <div style={{fontSize:12,color:"#A08060",marginBottom:8}}>🔍 Ricerca manuale (prodotti senza barcode)</div>
          <input value={searchQ} onChange={e=>setSearchQ(e.target.value)} placeholder="Cerca per nome o codice..." style={{...iStyle,marginBottom:10}}/>
          <div style={{maxHeight:200,overflowY:"auto",display:"flex",flexDirection:"column",gap:4}}>
            {filteredProducts.map(p=>(
              <div key={p.id} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 10px",background:"#1A1410",borderRadius:8,cursor:"pointer"}} onClick={()=>addToCart(p)}>
                <div style={{flex:1}}>
                  <div style={{fontSize:13}}>{p.name}</div>
                  <div style={{fontSize:11,color:"#A08060"}}>{p.barcode||"Nessun barcode"} · Stock: {p.stock} · IVA: {p.iva||22}%</div>
                </div>
                <div style={{fontWeight:700,color:"#D96C05",fontSize:13}}>{fmt(p.sellPrice)}</div>
                <button onClick={e=>{e.stopPropagation();addToCart(p);}} style={{background:"#D96C05",color:"white",border:"none",borderRadius:6,padding:"4px 10px",cursor:"pointer",fontSize:12}}>+</button>
              </div>
            ))}
          </div>
        </div>

        {/* Vendite recenti */}
        <div style={{background:"#231A12",border:"1px solid #3D2E1E",borderRadius:12,padding:14}}>
          <div style={{fontSize:13,fontWeight:700,color:"#D96C05",marginBottom:10}}>🕒 Vendite recenti</div>
          {recentSales.length===0&&<div style={{color:"#A08060",fontSize:13}}>Nessuna vendita ancora.</div>}
          {recentSales.map(s=>{
            const lordo=s.qty*s.sellPrice;
            const {imponibile}=scorporaIva(lordo,s.iva||22);
            return(
              <div key={s.id} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid #3D2E1E",fontSize:12}}>
                <span style={{color:"#A08060"}}>{new Date(s.date).toLocaleString("it-IT",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"})}</span>
                <span style={{flex:1,paddingLeft:8}}>{s.name} ×{s.qty}</span>
                <span style={{color:"#A08060",fontSize:11,paddingRight:6}}>IVA {s.iva||22}%</span>
                <span style={{color:"#D96C05",fontWeight:600}}>{fmt(lordo)}</span>
              </div>
            );
          })}
        </div>
      </div>

      {/* Carrello */}
      <div style={{background:"#231A12",border:"1px solid #3D2E1E",borderRadius:12,padding:16,height:"fit-content",position:"sticky",top:80}}>
        <div style={{fontSize:14,fontWeight:700,color:"#D96C05",marginBottom:12}}>🛒 Carrello ({cart.length})</div>
        {cart.length===0&&<div style={{color:"#A08060",fontSize:13,textAlign:"center",padding:20}}>Vuoto — scansiona o cerca un prodotto</div>}
        {cart.map(item=>(
          <div key={item.id} style={{marginBottom:10,padding:"8px 0",borderBottom:"1px solid #3D2E1E"}}>
            <div style={{fontSize:13,marginBottom:2}}>{item.name}</div>
            <div style={{fontSize:11,color:"#A08060",marginBottom:4}}>IVA {item.iva||22}% · {fmt(item.sellPrice)}/pz</div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <button onClick={()=>setCart(prev=>prev.map(i=>i.id===item.id&&i.qty>1?{...i,qty:i.qty-1}:i))} style={{background:"#3D2E1E",border:"none",color:"#F5EDE3",borderRadius:4,width:24,height:24,cursor:"pointer"}}>-</button>
              <span style={{minWidth:24,textAlign:"center",fontSize:14,fontWeight:700}}>{item.qty}</span>
              <button onClick={()=>setCart(prev=>prev.map(i=>i.id===item.id?{...i,qty:i.qty+1}:i))} style={{background:"#3D2E1E",border:"none",color:"#F5EDE3",borderRadius:4,width:24,height:24,cursor:"pointer"}}>+</button>
              <span style={{marginLeft:"auto",color:"#D96C05",fontWeight:700}}>{fmt(item.qty*item.sellPrice)}</span>
              <button onClick={()=>setCart(prev=>prev.filter(i=>i.id!==item.id))} style={{background:"none",border:"none",color:"#A08060",cursor:"pointer",padding:2}}>✕</button>
            </div>
          </div>
        ))}
        {cart.length>0&&(
          <>
            {/* Riepilogo IVA */}
            <div style={{background:"#1A1410",borderRadius:8,padding:"8px 10px",marginTop:4,marginBottom:8,fontSize:12}}>
              <div style={{color:"#A08060",marginBottom:4,fontWeight:600}}>Riepilogo IVA:</div>
              {Object.entries(ivaGroups).map(([aliq,v])=>(
                <div key={aliq} style={{display:"flex",justifyContent:"space-between",color:"#A08060",marginBottom:2}}>
                  <span>IVA {aliq}% su {fmt(v.base)}</span>
                  <span style={{color:"#A78BFA"}}>{fmt(v.iva)}</span>
                </div>
              ))}
              <div style={{display:"flex",justifyContent:"space-between",borderTop:"1px solid #3D2E1E",paddingTop:4,marginTop:4}}>
                <span style={{color:"#A08060"}}>Imponibile</span>
                <span>{fmt(cartImponibile)}</span>
              </div>
              <div style={{display:"flex",justifyContent:"space-between"}}>
                <span style={{color:"#A08060"}}>IVA totale</span>
                <span style={{color:"#A78BFA"}}>{fmt(cartIva)}</span>
              </div>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",padding:"8px 0",fontSize:17,fontWeight:800,borderTop:"2px solid #3D2E1E"}}>
              <span>Totale</span><span style={{color:"#D96C05"}}>{fmt(cartLordo)}</span>
            </div>
            <button onClick={confirmSale} style={{width:"100%",background:"#D96C05",color:"white",border:"none",borderRadius:10,padding:"12px",fontSize:15,fontWeight:700,cursor:"pointer",marginTop:4}}>✅ Conferma Vendita</button>
            <button onClick={()=>setCart([])} style={{width:"100%",marginTop:8,background:"transparent",color:"#A08060",border:"1px solid #3D2E1E",borderRadius:10,padding:"8px",fontSize:13,cursor:"pointer"}}>Svuota carrello</button>
          </>
        )}
      </div>
    </div>
  );
}

// ─── PRODOTTI ────────────────────────────────────────────────────────────────
function Prodotti({products,setProducts}){
  const empty={name:"",barcode:"",buyPrice:"",sellPrice:"",stock:"",minStock:"",category:"",iva:22};
  const [form,setForm]=useState(empty);
  const [editId,setEditId]=useState(null);
  const [search,setSearch]=useState("");
  const [catFilter,setCatFilter]=useState("Tutte");

  const categories=["Tutte",...new Set(products.map(p=>p.category).filter(Boolean))];

  // Auto-imposta IVA quando cambia la categoria
  const handleCategoryChange = (cat) => {
    setForm(f=>({...f, category:cat, iva:ivaForCategory(cat)}));
  };

  const handleSave=()=>{
    if(!form.name||!form.sellPrice)return;
    const entry={...form,buyPrice:parseFloat(form.buyPrice)||0,sellPrice:parseFloat(form.sellPrice),stock:parseInt(form.stock)||0,minStock:parseInt(form.minStock)||0,iva:parseInt(form.iva)||22};
    if(editId){setProducts(prev=>prev.map(p=>p.id===editId?{...p,...entry}:p));setEditId(null);}
    else setProducts(prev=>[...prev,{...entry,id:uid()}]);
    setForm(empty);
  };

  const startEdit=(p)=>{setForm({...p,buyPrice:p.buyPrice.toString(),sellPrice:p.sellPrice.toString(),stock:p.stock.toString(),minStock:(p.minStock||0).toString(),iva:p.iva||22});setEditId(p.id);};

  const filtered=products.filter(p=>{
    const matchCat=catFilter==="Tutte"||p.category===catFilter;
    const matchSearch=p.name.toLowerCase().includes(search.toLowerCase())||p.barcode?.includes(search);
    return matchCat&&matchSearch;
  });
  const stockColor=(p)=>{if(p.stock===0)return"#E05252";if(p.stock<=(p.minStock||0))return"#E8C44A";return"#5CB85C";};

  // Calcola prezzo netto per mostrare l'imponibile
  const nettoVendita = (p) => p.sellPrice / (1 + (p.iva||22)/100);

  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div style={{background:"#231A12",border:"1px solid #3D2E1E",borderRadius:12,padding:16}}>
        <div style={{fontSize:14,fontWeight:700,color:"#D96C05",marginBottom:12}}>{editId?"✏️ Modifica Prodotto":"➕ Nuovo Prodotto"}</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:10}}>
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            <label style={{fontSize:11,color:"#A08060"}}>Nome *</label>
            <input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="Nome prodotto" style={iStyle}/>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            <label style={{fontSize:11,color:"#A08060"}}>Codice a barre</label>
            <input value={form.barcode} onChange={e=>setForm(f=>({...f,barcode:e.target.value}))} placeholder="(opzionale)" style={iStyle}/>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            <label style={{fontSize:11,color:"#A08060"}}>Prezzo acquisto € (IVA incl.)</label>
            <input type="number" step="0.01" value={form.buyPrice} onChange={e=>setForm(f=>({...f,buyPrice:e.target.value}))} placeholder="0.00" style={iStyle}/>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            <label style={{fontSize:11,color:"#A08060"}}>Prezzo vendita € (IVA incl.) *</label>
            <input type="number" step="0.01" value={form.sellPrice} onChange={e=>setForm(f=>({...f,sellPrice:e.target.value}))} placeholder="0.00" style={iStyle}/>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            <label style={{fontSize:11,color:"#A08060"}}>Quantità stock</label>
            <input type="number" value={form.stock} onChange={e=>setForm(f=>({...f,stock:e.target.value}))} placeholder="0" style={iStyle}/>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            <label style={{fontSize:11,color:"#A08060"}}>Stock minimo allerta</label>
            <input type="number" value={form.minStock} onChange={e=>setForm(f=>({...f,minStock:e.target.value}))} placeholder="0" style={iStyle}/>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:4}}>

          </div>

            <label style={{fontSize:11,color:"#A08060"}}>Aliquota IVA</label>
            <select value={form.iva} onChange={e=>setForm(f=>({...f,iva:parseInt(e.target.value)}))} style={iStyle}>
              <option value={22}>22% (standard)</option>
              <option value={10}>10% (BARF / alim. animali)</option>

            {editId&&<button onClick={()=>{setForm(empty);setEditId(null);}} style={{flex:1,background:"#3D2E1E",color:"#F5EDE3",border:"none",borderRadius:8,padding:"9px",fontSize:13,cursor:"pointer"}}>Annulla</button>}
          </div>
        </div>
        {form.buyPrice&&form.sellPrice&&(()=>{
          const sell=parseFloat(form.sellPrice)||0;
          const buy=parseFloat(form.buyPrice)||0;
          const iva=parseInt(form.iva)||22;
          const sellNetto=sell/(1+iva/100);
          const buyNetto=buy/(1+iva/100);
          const margin=sellNetto-buyNetto;
          const marginPct=sellNetto>0?(margin/sellNetto*100).toFixed(1):0;

            <div style={{marginTop:10,padding:"8px 12px",background:"#1A1410",borderRadius:8,fontSize:12,color:"#A08060",display:"flex",gap:20,flexWrap:"wrap"}}>

              <span>Imponibile acquisto: <strong style={{color:"#F5EDE3"}}>{fmt(buyNetto)}</strong></span>
              <span>Margine netto: <strong style={{color:"#5CB85C"}}>{fmt(margin)} ({marginPct}%)</strong></span>
              <span>IVA sul prezzo: <strong style={{color:"#A78BFA"}}>{fmt(sell-sellNetto)} ({iva}%)</strong></span>

      <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Cerca prodotto..." style={{...iStyle,flex:1,minWidth:160}}/>

        {filtered.length===0&&<div style={{color:"#A08060",textAlign:"center",padding:20,fontSize:13}}>Nessun prodotto trovato.</div>}
        {filtered.map(p=>{
          const margin=((p.sellPrice/(1+(p.iva||22)/100))-(p.buyPrice/(1+(p.iva||22)/100)));
          const marginPct=p.sellPrice>0?(margin/(p.sellPrice/(1+(p.iva||22)/100))*100).toFixed(0):0;
          return(
            <div key={p.id} style={{background:"#231A12",border:"1px solid #3D2E1E",borderRadius:10,padding:"10px 14px",display:"flex",alignItems:"center",gap:12}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:stockColor(p),flexShrink:0}}/>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:600}}>{p.name}</div>
                <div style={{fontSize:11,color:"#A08060"}}>{p.barcode||"Nessun barcode"} · {p.category} · IVA {p.iva||22}%</div>
              </div>
              <div style={{textAlign:"right",fontSize:12}}>
                <div style={{color:"#D96C05",fontWeight:700}}>{fmt(p.sellPrice)} <span style={{color:"#A08060",fontSize:10}}>IVA incl.</span></div>
                <div style={{color:"#A08060"}}>mg netto: {fmt(margin)} ({marginPct}%)</div>
              </div>
              <div style={{textAlign:"right",fontSize:12,minWidth:60}}>
                <div style={{color:stockColor(p),fontWeight:700}}>{p.stock} pz</div>
                <div style={{color:"#A08060"}}>min: {p.minStock||0}</div>
              </div>
              <div style={{display:"flex",gap:4}}>
                <button onClick={()=>startEdit(p)} style={{background:"#3D2E1E",border:"none",color:"#D96C05",borderRadius:6,padding:"5px 8px",cursor:"pointer",fontSize:12}}>✏️</button>
                <button onClick={()=>setProducts(prev=>prev.filter(x=>x.id!==p.id))} style={{background:"#3D2E1E",border:"none",color:"#E05252",borderRadius:6,padding:"5px 8px",cursor:"pointer",fontSize:12}}>🗑</button>

            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── ORDINI ──────────────────────────────────────────────────────────────────
function Ordini({products,getSalesByProduct,settings,setSettings}){
  const [budget,setBudget]=useState(settings.budget.toString());
  const [horizon,setHorizon]=useState("1");
  const saveBudget=()=>setSettings(s=>({...s,budget:parseFloat(budget)||0}));
  const now=new Date();
  const lastMonths=[0,1,2].map(i=>{const d=new Date(now.getFullYear(),now.getMonth()-i,1);return d.toISOString().slice(0,7);});
  const salesMaps=lastMonths.map(m=>getSalesByProduct(m));
  const avgSales={};
  products.forEach(p=>{
    const totals=salesMaps.map(m=>m[p.id]?.qty||0);
    const nonZero=totals.filter(x=>x>0);
    avgSales[p.id]=nonZero.length>0?nonZero.reduce((a,b)=>a+b,0)/nonZero.length:0;
  });
  const h=parseInt(horizon);
  const proposals=products.map(p=>{
    const avg=avgSales[p.id];
    const needed=Math.ceil(avg*h);
    const toOrder=Math.max(0,needed-p.stock);
    const cost=toOrder*p.buyPrice;
    return{...p,avg:avg.toFixed(1),needed,toOrder,cost};
  }).filter(p=>p.toOrder>0).sort((a,b)=>b.cost-a.cost);
  const totalCost=proposals.reduce((a,p)=>a+p.cost,0);
  const budgetLeft=settings.budget-totalCost;
  let cumulative=0;
  const prioritized=proposals.map(p=>{const fits=cumulative+p.cost<=settings.budget;if(fits)cumulative+=p.cost;return{...p,fits};});
  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div style={{background:"#231A12",border:"1px solid #3D2E1E",borderRadius:12,padding:16,display:"flex",gap:16,flexWrap:"wrap",alignItems:"flex-end"}}>
        <div style={{flex:1,minWidth:200}}>
          <div style={{fontSize:14,fontWeight:700,color:"#D96C05",marginBottom:10}}>⚙️ Parametri ordine</div>
          <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              <label style={{fontSize:11,color:"#A08060"}}>Orizzonte temporale</label>
              <select value={horizon} onChange={e=>setHorizon(e.target.value)} style={{...iStyle,minWidth:180}}>
                <option value="1">Copertura 1 mese</option>
                <option value="2">Copertura 2 mesi</option>
              </select>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              <label style={{fontSize:11,color:"#A08060"}}>Budget disponibile €</label>
              <div style={{display:"flex",gap:6}}>
                <input type="number" value={budget} onChange={e=>setBudget(e.target.value)} style={{...iStyle,width:120}}/>
                <button onClick={saveBudget} style={{background:"#D96C05",color:"white",border:"none",borderRadius:8,padding:"8px 12px",fontSize:12,cursor:"pointer"}}>Salva</button>
              </div>
            </div>
          </div>
        </div>
        <div style={{display:"flex",gap:24}}>
          <div style={{textAlign:"center"}}><div style={{fontSize:11,color:"#A08060"}}>Totale da ordinare</div><div style={{fontSize:20,fontWeight:800,color:"#D96C05"}}>{fmt(totalCost)}</div></div>
          <div style={{textAlign:"center"}}><div style={{fontSize:11,color:"#A08060"}}>Budget rimanente</div><div style={{fontSize:20,fontWeight:800,color:budgetLeft>=0?"#5CB85C":"#E05252"}}>{fmt(budgetLeft)}</div></div>
        </div>
      </div>
      {proposals.length===0?(
        <div style={{color:"#A08060",textAlign:"center",padding:30,fontSize:14}}>Nessun riordino necessario o dati vendita insufficienti.<br/>Registra alcune vendite per generare proposte.</div>
      ):(
        <>
          <div style={{fontSize:12,color:"#A08060"}}>I prezzi di acquisto sono IVA inclusa. Le righe verdi rientrano nel budget.</div>
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            {prioritized.map(p=>(
              <div key={p.id} style={{background:p.fits?"#1E2E1E":"#231A12",border:"1px solid "+(p.fits?"#2E5E2E":"#3D2E1E"),borderRadius:10,padding:"10px 14px",display:"flex",alignItems:"center",gap:12}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:600}}>{p.name}</div>
                  <div style={{fontSize:11,color:"#A08060"}}>{p.category} · IVA {p.iva||22}% · Ven. media: {p.avg}/mese · Stock: {p.stock}</div>
                </div>
                <div style={{textAlign:"right",minWidth:90}}><div style={{fontSize:13,fontWeight:700}}>Ordina: {p.toOrder} pz</div><div style={{fontSize:11,color:"#A08060"}}>Copre {h} mese/i</div></div>
                <div style={{textAlign:"right",minWidth:80}}><div style={{fontSize:13,fontWeight:700,color:"#E8C44A"}}>{fmt(p.cost)}</div><div style={{fontSize:11,color:"#A08060"}}>{fmt(p.buyPrice)}/pz</div></div>
                <div style={{fontSize:12,fontWeight:700,color:p.fits?"#5CB85C":"#E05252",minWidth:60,textAlign:"right"}}>{p.fits?"✅ Ok":"⛔ Budget"}</div>
              </div>
            ))}
          </div>
        </>
      )}
    </div>
  );
}

// ─── REPORT ──────────────────────────────────────────────────────────────────
function Report({products,sales,expenses,getSalesByProduct}){
  const [selMonth,setSelMonth]=useState(thisMonth());
  const months=[...new Set([thisMonth(),...sales.map(s=>s.date.slice(0,7)),...expenses.map(e=>e.month)])].sort().reverse();
  const salesMap=getSalesByProduct(selMonth);
  const monthSales=sales.filter(s=>s.date.startsWith(selMonth));
  const monthExpenses=expenses.filter(e=>e.month===selMonth);

  // Calcoli con IVA scorporata
  let totalLordo=0,totalImponibile=0,totalIva22=0,totalIva10=0,totalCostGoods=0;
  monthSales.forEach(s=>{
    const lordo=s.qty*s.sellPrice;
    const {imponibile,iva}=scorporaIva(lordo,s.iva||22);
    totalLordo+=lordo;
    totalImponibile+=imponibile;
    if((s.iva||22)===10) totalIva10+=iva; else totalIva22+=iva;
    totalCostGoods+=s.qty*s.buyPrice;
  });
  const totalIva=totalIva22+totalIva10;
  const grossMargin=totalImponibile-totalCostGoods;
  const totalExpenses=monthExpenses.reduce((a,e)=>a+e.amount,0);
  const netResult=grossMargin-totalExpenses;
  const marginPct=totalImponibile>0?(grossMargin/totalImponibile*100).toFixed(1):0;

  const productBreakdown=Object.entries(salesMap).map(([id,d])=>({product:products.find(p=>p.id===id),...d})).filter(x=>x.product).sort((a,b)=>b.revenue-a.revenue);
  const stockValue=products.reduce((a,p)=>a+p.stock*p.buyPrice,0);
  const stockRetailValue=products.reduce((a,p)=>a+p.stock*p.sellPrice,0);

  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div style={{display:"flex",gap:10,alignItems:"center"}}>
        <label style={{fontSize:12,color:"#A08060"}}>Mese:</label>
        <select value={selMonth} onChange={e=>setSelMonth(e.target.value)} style={{...iStyle,minWidth:140}}>{months.map(m=><option key={m}>{m}</option>)}</select>
      </div>

      {/* Conto economico */}
      <div style={{background:"#231A12",border:"1px solid #3D2E1E",borderRadius:12,padding:16}}>
        <div style={{fontSize:14,fontWeight:700,color:"#D96C05",marginBottom:12}}>📊 Conto Economico — {selMonth}</div>
        {[
          {label:"Incassato (IVA inclusa)",value:fmt(totalLordo),color:"#D96C05"},
          {label:"IVA collettata (da versare)",value:"- "+fmt(totalIva),color:"#A78BFA"},
          {label:"Fatturato netto (imponibile)",value:fmt(totalImponibile),color:"#F28C35",bold:true},
          {label:"Costo del venduto (acquisti)",value:"- "+fmt(totalCostGoods),color:"#E05252"},
          {label:"Margine lordo",value:fmt(grossMargin)+" ("+marginPct+"%)",color:grossMargin>=0?"#5CB85C":"#E05252",bold:true},
          {label:"Spese fisse",value:"- "+fmt(totalExpenses),color:"#E8C44A"},
          {label:"Risultato netto",value:fmt(netResult),color:netResult>=0?"#5CB85C":"#E05252",bold:true,big:true},
        ].map((row,i)=>(
          <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:i<6?"1px solid #3D2E1E":"none"}}>
            <span style={{fontSize:row.big?15:13,fontWeight:row.bold?700:400}}>{row.label}</span>
            <span style={{fontSize:row.big?16:13,fontWeight:row.bold?800:600,color:row.color}}>{row.value}</span>
          </div>
        ))}
      </div>

      {/* Riepilogo IVA */}
      <div style={{background:"#231A12",border:"1px solid #3D2E1E",borderRadius:12,padding:16}}>
        <div style={{fontSize:14,fontWeight:700,color:"#A78BFA",marginBottom:10}}>🏛️ Riepilogo IVA — {selMonth}</div>
        <div style={{display:"flex",gap:20,flexWrap:"wrap"}}>
          {totalIva22>0&&<div style={{flex:1,minWidth:140,background:"#1A1410",borderRadius:8,padding:"10px 12px"}}>
            <div style={{fontSize:11,color:"#A08060"}}>IVA 22% (standard)</div>
            <div style={{fontSize:18,fontWeight:800,color:"#A78BFA"}}>{fmt(totalIva22)}</div>
          </div>}
          {totalIva10>0&&<div style={{flex:1,minWidth:140,background:"#1A1410",borderRadius:8,padding:"10px 12px"}}>
            <div style={{fontSize:11,color:"#A08060"}}>IVA 10% (BARF)</div>
            <div style={{fontSize:18,fontWeight:800,color:"#A78BFA"}}>{fmt(totalIva10)}</div>
          </div>}
          <div style={{flex:1,minWidth:140,background:"#1A1410",borderRadius:8,padding:"10px 12px"}}>
            <div style={{fontSize:11,color:"#A08060"}}>Totale IVA da versare</div>
            <div style={{fontSize:18,fontWeight:800,color:"#A78BFA"}}>{fmt(totalIva)}</div>
          </div>
        </div>
        <div style={{marginTop:8,fontSize:11,color:"#A08060"}}>⚠️ Questi sono i dati sulle vendite registrate. Confronta con i tuoi acquisti per la liquidazione IVA effettiva.</div>
      </div>

      {/* Spese */}
      {monthExpenses.length>0&&(
        <div style={{background:"#231A12",border:"1px solid #3D2E1E",borderRadius:12,padding:16}}>
          <div style={{fontSize:14,fontWeight:700,color:"#D96C05",marginBottom:10}}>💳 Dettaglio Spese</div>
          {monthExpenses.map(e=>(
            <div key={e.id} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid #3D2E1E",fontSize:13}}>
              <span>{e.label}</span><span style={{color:"#E8C44A",fontWeight:600}}>{fmt(e.amount)}</span>
            </div>
          ))}
        </div>
      )}

      {/* Vendite per prodotto */}
      {productBreakdown.length>0&&(
        <div style={{background:"#231A12",border:"1px solid #3D2E1E",borderRadius:12,padding:16}}>
          <div style={{fontSize:14,fontWeight:700,color:"#D96C05",marginBottom:10}}>🏷️ Vendite per Prodotto</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr auto auto auto auto",gap:"4px 12px",fontSize:11,color:"#A08060",marginBottom:6}}>
            <span>Prodotto</span><span style={{textAlign:"right"}}>Qtà</span><span style={{textAlign:"right"}}>IVA</span><span style={{textAlign:"right"}}>Ricavo netto</span><span style={{textAlign:"right"}}>Margine</span>
          </div>
          {productBreakdown.map(({product,qty,revenue:rev,cost})=>{
            const iva=product.iva||22;
            const revNetto=rev/(1+iva/100);
            const costNetto=cost/(1+iva/100);
            return(
              <div key={product.id} style={{display:"grid",gridTemplateColumns:"1fr auto auto auto auto",gap:"4px 12px",padding:"6px 0",borderBottom:"1px solid #3D2E1E",fontSize:12}}>
                <span>{product.name}</span>
                <span style={{textAlign:"right",color:"#A08060"}}>{qty}</span>
                <span style={{textAlign:"right",color:"#A78BFA"}}>{iva}%</span>
                <span style={{textAlign:"right",color:"#D96C05",fontWeight:600}}>{fmt(revNetto)}</span>
                <span style={{textAlign:"right",color:"#5CB85C",fontWeight:600}}>{fmt(revNetto-costNetto)}</span>
              </div>
            );
          })}
        </div>
      )}

      {/* Valore magazzino */}
      <div style={{background:"#231A12",border:"1px solid #3D2E1E",borderRadius:12,padding:16}}>
        <div style={{fontSize:14,fontWeight:700,color:"#D96C05",marginBottom:10}}>📦 Valore Magazzino (attuale)</div>
        <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
          <div style={{flex:1,minWidth:130,background:"#1A1410",borderRadius:8,padding:"10px 12px"}}>
            <div style={{fontSize:11,color:"#A08060"}}>Costo acquisto</div>
            <div style={{fontSize:18,fontWeight:800,color:"#E8C44A"}}>{fmt(stockValue)}</div>
          </div>
          <div style={{flex:1,minWidth:130,background:"#1A1410",borderRadius:8,padding:"10px 12px"}}>
            <div style={{fontSize:11,color:"#A08060"}}>Valore vendita (IVA incl.)</div>
            <div style={{fontSize:18,fontWeight:800,color:"#D96C05"}}>{fmt(stockRetailValue)}</div>
          </div>
          <div style={{flex:1,minWidth:130,background:"#1A1410",borderRadius:8,padding:"10px 12px"}}>
            <div style={{fontSize:11,color:"#A08060"}}>Margine potenziale netto</div>
            <div style={{fontSize:18,fontWeight:800,color:"#5CB85C"}}>{fmt(stockRetailValue-stockValue)}</div>
          </div>
        </div>
      </div>
    </div>
  );
}

  useEffect(()=>save(KEYS.products,products),[products]);
  useEffect(()=>save(KEYS.sales,sales),[sales]);
  useEffect(()=>save(KEYS.expenses,expenses),[expenses]);
  useEffect(()=>save(KEYS.settings,settings),[settings]);
  const getSalesThisMonth=useCallback(()=>{const m=thisMonth();return sales.filter(s=>s.date.startsWith(m));},[sales]);
  const getSalesByProduct=useCallback((monthStr)=>{
    const m=monthStr||thisMonth();
    const map={};
    sales.filter(s=>s.date.startsWith(m)).forEach(s=>{
      if(!map[s.productId])map[s.productId]={qty:0,revenue:0,cost:0};
      map[s.productId].qty+=s.qty;
      map[s.productId].revenue+=s.qty*s.sellPrice;
      map[s.productId].cost+=s.qty*s.buyPrice;
    });
    return map;
  },[sales]);
  const tabs=[
    {id:"dashboard",label:"Dashboard",icon:"🏠"},
    {id:"cassa",label:"Cassa / Vendite",icon:"🛒"},
    {id:"prodotti",label:"Prodotti",icon:"📦"},
    {id:"spese",label:"Spese",icon:"💳"},
    {id:"ordini",label:"Proposta Ordini",icon:"📋"},
    {id:"report",label:"Report",icon:"📊"},
  ];
  return (
    <div>
      <div style={{background:"#231A12",borderBottom:"1px solid #3D2E1E",padding:"12px 20px",display:"flex",alignItems:"center",gap:12,position:"sticky",top:0,zIndex:50}}>
        <div style={{width:36,height:36,borderRadius:"50%",background:"#D96C05",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>🐾</div>
        <div>
          <div style={{fontWeight:700,fontSize:15}}>A Passo di Coda</div>
          <div style={{fontSize:11,color:"#A08060"}}>Gestionale negozio</div>
        </div>
        <div style={{marginLeft:"auto",fontSize:12,color:"#A08060"}}>{new Date().toLocaleDateString("it-IT",{weekday:"long",day:"numeric",month:"long"})}</div>
      </div>
      <div style={{background:"#231A12",borderBottom:"1px solid #3D2E1E",overflowX:"auto",display:"flex"}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)}
            style={{padding:"10px 16px",fontSize:13,fontWeight:tab===t.id?700:500,color:tab===t.id?"#D96C05":"#A08060",background:"none",border:"none",cursor:"pointer",borderBottom:tab===t.id?"2px solid #D96C05":"2px solid transparent",whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:6,transition:"all 0.15s"}}>
            {t.icon} {t.label}
          </button>
        ))}
      </div>
      <div style={{padding:"16px",maxWidth:1100,margin:"0 auto"}}>
        {tab==="dashboard"&&<Dashboard products={products} sales={sales} expenses={expenses} getSalesThisMonth={getSalesThisMonth} getSalesByProduct={getSalesByProduct}/>}
        {tab==="cassa"&&<Cassa products={products} setProducts={setProducts} sales={sales} setSales={setSales}/>}
        {tab==="prodotti"&&<Prodotti products={products} setProducts={setProducts}/>}
        {tab==="spese"&&<Spese expenses={expenses} setExpenses={setExpenses}/>}
        {tab==="ordini"&&<Ordini products={products} getSalesByProduct={getSalesByProduct} settings={settings} setSettings={setSettings}/>}
        {tab==="report"&&<Report products={products} sales={sales} expenses={expenses} getSalesByProduct={getSalesByProduct}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
