<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🐾 Gestionale — A Passo di Coda</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#1A1410;color:#F5EDE3;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:#1A1410}
  ::-webkit-scrollbar-thumb{background:#3D2E1E;border-radius:3px}
  select option{background:#1A1410;color:#F5EDE3}
  @media print{.no-print{display:none!important}.print-only{display:block!important}}
  .print-only{display:none}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const KEYS = { products:"apc_products", sales:"apc_sales", expenses:"apc_expenses", settings:"apc_settings" };
const load = (k) => { try { return JSON.parse(localStorage.getItem(k)) || null; } catch { return null; } };
const save = (k, v) => localStorage.setItem(k, JSON.stringify(v));
const ivaForCategory = (cat) => (cat||"").toUpperCase().includes("BARF") ? 10 : 22;
const CATEGORIES = ["Crocchette cane","Umido cane","Masticativi","Guinzagli e pettorine","Accessori cane","Snack cane","Crocchette gatto","Umido gatto","Snack gatto","Accessori gatto","BARF"];

const SUPPLIERS_DEFAULT = [
  {id:"sup1", name:"Global Pet", minOrder:1000, brands:["Wildfull","Narava","Kudo","Terra Canis","Leonardo","Natua","Belcando"]},
  {id:"sup2", name:"DPO", minOrder:450, brands:[]},
  {id:"sup3", name:"Welldog", minOrder:715, brands:["Welldog"]},
  {id:"sup4", name:"Capi", minOrder:380, brands:["Primordial"]},
  {id:"sup5", name:"Pura Natura", minOrder:380, brands:["Pura Natura"]},
  {id:"sup6", name:"Disugual", minOrder:300, brands:["Disugual"]},
  {id:"sup7", name:"CIam", minOrder:300, brands:["Woolf","Marie","Orazio","Quapas"]},
  {id:"sup8", name:"Farm Company", minOrder:300, brands:["Farm Company","Naso Nero"]},
  {id:"sup9", name:"Mast", minOrder:250, brands:[]},
  {id:"sup10", name:"Harper & Bone", minOrder:250, brands:["Harper and Bone"]},
  {id:"sup11", name:"Sanadog", minOrder:0, brands:["Mennuti","Fidovet","Yogupet"]},
  {id:"sup12", name:"Kauartikel", minOrder:0, brands:["Nest","Flexi"]},
  {id:"sup13", name:"Biscofarm", minOrder:0, brands:[]},
];

const fmt = (n) => new Intl.NumberFormat("it-IT",{style:"currency",currency:"EUR"}).format(n||0);
const nowISO = () => new Date().toISOString();
const thisMonth = () => new Date().toISOString().slice(0,7);
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const scorporaIva = (prezzoIvato, aliquota) => {
  const imponibile = prezzoIvato / (1 + aliquota / 100);
  return { imponibile, iva: prezzoIvato - imponibile };
};

// Giorni alla scadenza
const daysToExpiry = (dateStr) => {
  if(!dateStr) return null;
  const diff = new Date(dateStr) - new Date();
  return Math.ceil(diff / (1000*60*60*24));
};

const iStyle = { background:"#1A1410", border:"1px solid #3D2E1E", borderRadius:8, padding:"8px 12px", color:"#F5EDE3", fontSize:13, outline:"none", width:"100%", boxSizing:"border-box" };

function StatCard({label,value,sub,color,icon}){
  return (
    <div style={{background:"#231A12",border:"1px solid #3D2E1E",borderRadius:12,padding:"14px 16px"}}>
      <div style={{display:"flex",alignItems:"center",gap:6,color:"#A08060",fontSize:12,marginBottom:6}}>{icon}<span>{label}</span></div>
      <div style={{fontSize:22,fontWeight:800,color:color||"#F5EDE3"}}>{value}</div>
      {sub&&<div style={{fontSize:11,color:"#A08060",marginTop:3}}>{sub}</div>}
    </div>
  );
}

// ─── DASHBOARD ───────────────────────────────────────────────────────────────
function Dashboard({products,sales,expenses,getSalesThisMonth,getSalesByProduct}){
  const m=thisMonth();
  const salesMonth=getSalesThisMonth();
  const salesMap=getSalesByProduct(m);
  let totalLordo=0,totalImponibile=0,totalIvaCollettata=0,totalCostGoods=0,totalSconti=0;
  salesMonth.forEach(s=>{
    const lordo=s.qty*s.sellPrice;
    const {imponibile,iva}=scorporaIva(lordo,s.iva||22);
    totalLordo+=lordo;
    totalImponibile+=imponibile;
    totalIvaCollettata+=iva;
    totalCostGoods+=s.qty*s.buyPrice;
    totalSconti+=(s.discountAmount||0);
  });
  const grossMargin=totalImponibile-totalCostGoods;
  const totalExpenses=expenses.filter(e=>e.month===m).reduce((a,e)=>a+e.amount,0);
  const netResult=grossMargin-totalExpenses;
  const lowStock=products.filter(p=>p.stock<=(p.minStock||0));
  const outOfStock=products.filter(p=>p.stock===0);

  // Alert scadenze
  const today = new Date();
  const expiryAlerts = products.filter(p=>p.expiryDate).map(p=>({...p,days:daysToExpiry(p.expiryDate)})).filter(p=>p.days<=30).sort((a,b)=>a.days-b.days);

  const topProducts=Object.entries(salesMap).map(([id,d])=>({product:products.find(p=>p.id===id),...d})).filter(x=>x.product).sort((a,b)=>b.revenue-a.revenue).slice(0,5);

  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(170px,1fr))",gap:12}}>
        <StatCard label="Incassato (IVA incl.)" value={fmt(totalLordo)} sub={salesMonth.length+" vendite"} color="#D96C05" icon="💰"/>
        <StatCard label="Fatturato netto" value={fmt(totalImponibile)} sub={"IVA: "+fmt(totalIvaCollettata)} color="#F28C35" icon="🧾"/>
        <StatCard label="Margine lordo" value={fmt(grossMargin)} sub={(totalImponibile>0?((grossMargin/totalImponibile)*100).toFixed(1):0)+"%"} color={grossMargin>=0?"#5CB85C":"#E05252"} icon="📈"/>
        <StatCard label="Spese mese" value={fmt(totalExpenses)} color="#E8C44A" icon="💳"/>
        <StatCard label="Risultato netto" value={fmt(netResult)} sub={netResult>=0?"✅ In positivo":"⚠️ In negativo"} color={netResult>=0?"#5CB85C":"#E05252"} icon="🏁"/>
        <StatCard label="IVA da versare" value={fmt(totalIvaCollettata)} sub="tenere da parte" color="#A78BFA" icon="🏛️"/>
        {totalSconti>0&&<StatCard label="Sconti applicati" value={fmt(totalSconti)} sub="questo mese" color="#E05252" icon="🏷️"/>}
      </div>

      {/* Alert scadenze */}
      {expiryAlerts.length>0&&(
        <div style={{background:"#1E1A2E",border:"1px solid #5A3A8A",borderRadius:12,padding:14}}>
          <div style={{fontWeight:700,fontSize:14,color:"#A78BFA",marginBottom:10}}>📅 Alert Scadenze</div>
          {expiryAlerts.map(p=>{
            const color=p.days<=0?"#E05252":p.days<=7?"#E05252":p.days<=14?"#E8C44A":"#A78BFA";
            const label=p.days<=0?"SCADUTO":p.days===1?"Scade domani":"Scade in "+p.days+" giorni";
            return(
              <div key={p.id} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid #3D2E1E",fontSize:13}}>
                <span>{p.name}</span>
                <span style={{color,fontWeight:700}}>{label} ({new Date(p.expiryDate).toLocaleDateString("it-IT")})</span>
              </div>
            );
          })}
        </div>
      )}

      {/* Alert stock */}
      {(lowStock.length>0||outOfStock.length>0)&&(
        <div style={{background:"#2E1A0E",border:"1px solid #7A3B0A",borderRadius:12,padding:14}}>
          <div style={{fontWeight:700,fontSize:14,color:"#F28C35",marginBottom:10}}>⚠️ Allerte Scorte</div>
          {outOfStock.map(p=>(<div key={p.id} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid #3D2E1E",fontSize:13}}><span>{p.name}</span><span style={{color:"#E05252",fontWeight:700}}>ESAURITO</span></div>))}
          {lowStock.filter(p=>p.stock>0).map(p=>(<div key={p.id} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid #3D2E1E",fontSize:13}}><span>{p.name}</span><span style={{color:"#E8C44A"}}>Solo {p.stock} pz (min: {p.minStock})</span></div>))}
        </div>
      )}

      {topProducts.length>0&&(
        <div style={{background:"#231A12",border:"1px solid #3D2E1E",borderRadius:12,padding:16}}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:12,color:"#D96C05"}}>🏆 Top Prodotti del Mese</div>
          {topProducts.map((t,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 0",borderBottom:"1px solid #3D2E1E",fontSize:13}}>
              <span style={{color:"#A08060",width:20}}>#{i+1}</span>
              <span style={{flex:1}}>{t.product.name}</span>
              <span style={{color:"#A08060"}}>{t.qty} pz</span>
              <span style={{fontWeight:700,color:"#D96C05"}}>{fmt(t.revenue)}</span>
            </div>
          ))}
        </div>
      )}
      {salesMonth.length===0&&<div style={{textAlign:"center",padding:40,color:"#A08060",fontSize:14}}>Nessuna vendita registrata questo mese.<br/>Vai in <strong style={{color:"#D96C05"}}>Cassa / Vendite</strong> per iniziare!</div>}
    </div>
  );
}

// ─── CASSA ───────────────────────────────────────────────────────────────────
function Cassa({products,setProducts,sales,setSales}){
  const [barcodeInput,setBarcodeInput]=useState("");
  const [cart,setCart]=useState([]);
  const [searchQ,setSearchQ]=useState("");
  const [msg,setMsg]=useState(null);
  // Sconti per articolo: {productId: {type:'%'|'€', value:''}}
  const [itemDiscounts,setItemDiscounts]=useState({});
  // Sconto totale
  const [totalDiscount,setTotalDiscount]=useState({type:"%",value:""});
  const [showReceipt,setShowReceipt]=useState(false);
  const [lastSale,setLastSale]=useState(null);
  const barcodeRef=useRef(null);
  useEffect(()=>{barcodeRef.current?.focus();},[]);

  const showMsg=(text,type="ok")=>{setMsg({text,type});setTimeout(()=>setMsg(null),2500);};

  const addToCart=(product,qty=1)=>{
    if(product.stock<qty){showMsg("Stock insufficiente ("+product.stock+" disponibili)","err");return;}
    setCart(prev=>{
      const existing=prev.find(i=>i.id===product.id);
      if(existing)return prev.map(i=>i.id===product.id?{...i,qty:i.qty+qty}:i);
      return[...prev,{...product,qty}];
    });
    showMsg("✓ "+product.name+" aggiunto","ok");
  };

  const handleBarcode=(e)=>{
    if(e.key==="Enter"){
      const code=barcodeInput.trim();if(!code)return;
      const p=products.find(x=>x.barcode===code);
      if(p){addToCart(p);setBarcodeInput("");}
      else showMsg("Codice non trovato: "+code,"err");
    }
  };

  // Calcola sconto per articolo
  const getItemDiscount=(item)=>{
    const d=itemDiscounts[item.id];
    if(!d||!d.value||parseFloat(d.value)===0)return 0;
    const base=item.qty*item.sellPrice;
    if(d.type==="%"){const pct=Math.min(100,parseFloat(d.value)||0);return base*(pct/100);}
    return Math.min(base,parseFloat(d.value)||0);
  };

  // Subtotale dopo sconti articolo
  const subtotalAfterItemDiscounts=cart.reduce((a,item)=>a+(item.qty*item.sellPrice-getItemDiscount(item)),0);

  // Sconto totale
  const getTotalDiscount=()=>{
    if(!totalDiscount.value||parseFloat(totalDiscount.value)===0)return 0;
    if(totalDiscount.type==="%"){const pct=Math.min(100,parseFloat(totalDiscount.value)||0);return subtotalAfterItemDiscounts*(pct/100);}
    return Math.min(subtotalAfterItemDiscounts,parseFloat(totalDiscount.value)||0);
  };

  const totalDiscountAmt=getTotalDiscount();
  const cartLordo=subtotalAfterItemDiscounts-totalDiscountAmt;
  const totalItemDiscounts=cart.reduce((a,item)=>a+getItemDiscount(item),0);
  const totalAllDiscounts=totalItemDiscounts+totalDiscountAmt;

  // Calcola IVA sul totale finale
  const cartRows=cart.map(item=>{
    const itemDisc=getItemDiscount(item);
    const ratio=(cart.length>0&&subtotalAfterItemDiscounts>0)?(item.qty*item.sellPrice-itemDisc)/subtotalAfterItemDiscounts:0;
    const itemTotalDisc=itemDisc+totalDiscountAmt*ratio;
    const finalPrice=(item.qty*item.sellPrice)-itemTotalDisc;
    const {imponibile,iva}=scorporaIva(finalPrice,item.iva||22);
    return{...item,finalPrice,imponibile,iva};
  });
  const cartImponibile=cartRows.reduce((a,r)=>a+r.imponibile,0);
  const cartIva=cartRows.reduce((a,r)=>a+r.iva,0);

  // Raggruppa IVA per aliquota
  const ivaGroups={};
  cartRows.forEach(r=>{const k=r.iva||22;if(!ivaGroups[k]){ivaGroups[k]={base:0,iva:0};}ivaGroups[k].base+=r.imponibile;ivaGroups[k].iva+=r.iva;});

  const confirmSale=()=>{
    if(cart.length===0)return;
    const now=nowISO();
    const saleId=uid();
    const newSales=cart.map(item=>{
      const row=cartRows.find(r=>r.id===item.id);
      const discOnItem=getItemDiscount(item);
      const ratio=subtotalAfterItemDiscounts>0?(item.qty*item.sellPrice-discOnItem)/subtotalAfterItemDiscounts:0;
      const discShare=totalDiscountAmt*ratio;
      return{
        id:uid(),saleGroupId:saleId,productId:item.id,qty:item.qty,
        sellPrice:item.sellPrice,buyPrice:item.buyPrice,iva:item.iva||22,
        discountAmount:(discOnItem+discShare),finalPrice:row.finalPrice,
        date:now,name:item.name
      };
    });
    const receipt={
      id:saleId,date:now,items:cart.map(item=>{
        const row=cartRows.find(r=>r.id===item.id);
        return{name:item.name,qty:item.qty,unitPrice:item.sellPrice,iva:item.iva||22,discount:getItemDiscount(item),finalPrice:row.finalPrice};
      }),
      totalDiscount:totalDiscountAmt,itemDiscounts:totalItemDiscounts,
      subtotal:cart.reduce((a,i)=>a+i.qty*i.sellPrice,0),
      total:cartLordo,imponibile:cartImponibile,iva:cartIva
    };
    setSales(prev=>[...prev,...newSales]);
    setProducts(prev=>prev.map(p=>{const ci=cart.find(c=>c.id===p.id);return ci?{...p,stock:p.stock-ci.qty}:p;}));
    setLastSale(receipt);
    setCart([]);setItemDiscounts({});setTotalDiscount({type:"%",value:""});
    setShowReceipt(true);
    showMsg("✅ Vendita registrata! Totale: "+fmt(cartLordo),"ok");
  };

  const filteredProducts=products.filter(p=>p.name.toLowerCase().includes(searchQ.toLowerCase())||p.barcode?.includes(searchQ));
  const recentSales=[...sales].reverse().slice(0,12);

  return (
    <div style={{display:"grid",gridTemplateColumns:"1fr 360px",gap:16}}>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        {/* Scanner */}
        <div style={{background:"#231A12",border:"2px solid #D96C05",borderRadius:12,padding:14}}>
          <div style={{fontSize:12,color:"#A08060",marginBottom:6}}>📡 Scansiona o inserisci codice a barre (premi Invio)</div>
          <input ref={barcodeRef} value={barcodeInput} onChange={e=>setBarcodeInput(e.target.value)} onKeyDown={handleBarcode} placeholder="Punta il lettore qui oppure digita il codice..." style={{...iStyle,fontSize:15}} autoComplete="off"/>
          {msg&&<div style={{marginTop:8,padding:"6px 10px",borderRadius:6,background:msg.type==="ok"?"#1E3A1E":"#3A1E1E",color:msg.type==="ok"?"#5CB85C":"#E05252",fontSize:13}}>{msg.text}</div>}
        </div>

        {/* Ricerca manuale */}
        <div style={{background:"#231A12",border:"1px solid #3D2E1E",borderRadius:12,padding:14}}>
          <div style={{fontSize:12,color:"#A08060",marginBottom:8}}>🔍 Ricerca manuale</div>
          <input value={searchQ} onChange={e=>setSearchQ(e.target.value)} placeholder="Cerca per nome o codice..." style={{...iStyle,marginBottom:10}}/>
          <div style={{maxHeight:180,overflowY:"auto",display:"flex",flexDirection:"column",gap:4}}>
            {filteredProducts.map(p=>(
              <div key={p.id} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 10px",background:"#1A1410",borderRadius:8,cursor:"pointer"}} onClick={()=>addToCart(p)}>
                <div style={{flex:1}}>
                  <div style={{fontSize:13}}>{p.name}</div>
                  <div style={{fontSize:11,color:"#A08060"}}>{p.barcode||"No barcode"} · Stock: {p.stock} · IVA {p.iva||22}%</div>
                </div>
                <div style={{fontWeight:700,color:"#D96C05",fontSize:13}}>{fmt(p.sellPrice)}</div>
                <button onClick={e=>{e.stopPropagation();addToCart(p);}} style={{background:"#D96C05",color:"white",border:"none",borderRadius:6,padding:"4px 10px",cursor:"pointer",fontSize:12}}>+</button>
              </div>
            ))}
          </div>
        </div>

        {/* Vendite recenti */}
        <div style={{background:"#231A12",border:"1px solid #3D2E1E",borderRadius:12,padding:14}}>
          <div style={{fontSize:13,fontWeight:700,color:"#D96C05",marginBottom:10}}>🕒 Vendite recenti</div>
          {recentSales.length===0&&<div style={{color:"#A08060",fontSize:13}}>Nessuna vendita ancora.</div>}
          {recentSales.map(s=>{
            const lordo=s.finalPrice||s.qty*s.sellPrice;
            return(
              <div key={s.id} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid #3D2E1E",fontSize:12}}>
                <span style={{color:"#A08060"}}>{new Date(s.date).toLocaleString("it-IT",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"})}</span>
                <span style={{flex:1,paddingLeft:8}}>{s.name} ×{s.qty}</span>
                {s.discountAmount>0&&<span style={{color:"#E05252",fontSize:11,paddingRight:6}}>-{fmt(s.discountAmount)}</span>}
                <span style={{color:"#D96C05",fontWeight:600}}>{fmt(lordo)}</span>
              </div>
            );
          })}
        </div>
      </div>

      {/* CARRELLO */}
      <div style={{background:"#231A12",border:"1px solid #3D2E1E",borderRadius:12,padding:16,height:"fit-content",position:"sticky",top:80}}>
        <div style={{fontSize:14,fontWeight:700,color:"#D96C05",marginBottom:12}}>🛒 Carrello ({cart.length})</div>
        {cart.length===0&&<div style={{color:"#A08060",fontSize:13,textAlign:"center",padding:20}}>Vuoto — scansiona o cerca un prodotto</div>}

        {cart.map(item=>{
          const disc=itemDiscounts[item.id]||{type:"%",value:""};
          const discAmt=getItemDiscount(item);
          return(
            <div key={item.id} style={{marginBottom:12,padding:"10px 0",borderBottom:"1px solid #3D2E1E"}}>
              <div style={{fontSize:13,marginBottom:2,fontWeight:600}}>{item.name}</div>
              <div style={{fontSize:11,color:"#A08060",marginBottom:6}}>IVA {item.iva||22}% · {fmt(item.sellPrice)}/pz</div>
              {/* Quantità */}
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                <button onClick={()=>setCart(prev=>prev.map(i=>i.id===item.id&&i.qty>1?{...i,qty:i.qty-1}:i))} style={{background:"#3D2E1E",border:"none",color:"#F5EDE3",borderRadius:4,width:26,height:26,cursor:"pointer",fontSize:15}}>-</button>
                <span style={{minWidth:24,textAlign:"center",fontSize:14,fontWeight:700}}>{item.qty}</span>
                <button onClick={()=>setCart(prev=>prev.map(i=>i.id===item.id?{...i,qty:i.qty+1}:i))} style={{background:"#3D2E1E",border:"none",color:"#F5EDE3",borderRadius:4,width:26,height:26,cursor:"pointer",fontSize:15}}>+</button>
                <span style={{marginLeft:"auto",color:discAmt>0?"#A08060":"#D96C05",fontWeight:700,textDecoration:discAmt>0?"line-through":"none",fontSize:13}}>{fmt(item.qty*item.sellPrice)}</span>
                {discAmt>0&&<span style={{color:"#5CB85C",fontWeight:700,fontSize:13}}>{fmt(item.qty*item.sellPrice-discAmt)}</span>}
                <button onClick={()=>setCart(prev=>prev.filter(i=>i.id!==item.id))} style={{background:"none",border:"none",color:"#A08060",cursor:"pointer",padding:2,fontSize:13}}>✕</button>
              </div>
              {/* Sconto articolo */}
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                <span style={{fontSize:11,color:"#A08060",whiteSpace:"nowrap"}}>Sconto art.:</span>
                <select value={disc.type} onChange={e=>setItemDiscounts(prev=>({...prev,[item.id]:{...disc,type:e.target.value}}))} style={{...iStyle,width:60,padding:"4px 6px",fontSize:11}}>
                  <option value="%">%</option>
                  <option value="€">€</option>
                </select>
                <input type="number" min="0" value={disc.value} onChange={e=>setItemDiscounts(prev=>({...prev,[item.id]:{...disc,value:e.target.value}}))} placeholder="0" style={{...iStyle,width:70,padding:"4px 8px",fontSize:11}}/>
                {discAmt>0&&<span style={{fontSize:11,color:"#E05252",whiteSpace:"nowrap"}}>-{fmt(discAmt)}</span>}
              </div>
            </div>
          );
        })}

        {cart.length>0&&(
          <>
            {/* Sconto totale */}
            <div style={{background:"#1A1410",borderRadius:8,padding:"10px",marginBottom:8}}>
              <div style={{fontSize:12,color:"#A08060",marginBottom:6,fontWeight:600}}>🏷️ Sconto sul totale:</div>
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                <select value={totalDiscount.type} onChange={e=>setTotalDiscount(d=>({...d,type:e.target.value}))} style={{...iStyle,width:60,padding:"4px 6px",fontSize:12}}>
                  <option value="%">%</option>
                  <option value="€">€</option>
                </select>

          const dRows=rows.map(r=>[r.barcode||"",'"'+r.name.replace(/"/g,""+'"'+'"')+'"',r.category||"",r.iva||22,r.stock,r.minStock||0,n(r.buyPrice),n(r.buyNetto),n(r.sellPrice),n(r.sellNetto),n(r.margineNetto),r.sellNetto>0?(r.margineNetto/r.sellNetto*100).toFixed(1)+"%":"0%",n(r.valAcqNetto),n(r.valAcqLordo),n(r.valVendNetto),n(r.valVendLordo),r.expiryDate?new Date(r.expiryDate).toLocaleDateString("it-IT"):""].join(sep));

}

// ─── ORDINI ──────────────────────────────────────────────────────────────────
function Ordini({products,getSalesByProduct,settings,setSettings,suppliers,setSuppliers}){
  const [budget,setBudget]=useState(settings.budget.toString());
  const [horizon,setHorizon]=useState("1");
  const [expandedSup,setExpandedSup]=useState({});
  const saveBudget=()=>setSettings(s=>({...s,budget:parseFloat(budget)||0}));

  const now=new Date();
  // Mesi: corrente + ultimi 3 — il mese in corso conta doppio perché è la vendita più fresca
  const currentMonth=now.toISOString().slice(0,7);
  const lastMonths=[0,1,2,3].map(i=>{const d=new Date(now.getFullYear(),now.getMonth()-i,1);return d.toISOString().slice(0,7);});
  // Pesi: mese corrente 0.45, -1 mese 0.30, -2 mese 0.15, -3 mese 0.10
  const weights=[0.45,0.30,0.15,0.10];
  const salesMaps=lastMonths.map(m=>getSalesByProduct(m));

  // Giorni trascorsi nel mese corrente (per estrapolazione)
  const daysInMonth=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  const daysPassed=now.getDate();
  const monthRatio=daysInMonth/Math.max(daysPassed,1); // fattore di proiezione mese corrente

  // Media ponderata per prodotto con proiezione mese corrente
  const avgSales={};
  products.forEach(p=>{
    let weightedSum=0,weightSum=0;
    salesMaps.forEach((m,i)=>{
      let qty=m[p.id]?.qty||0;
      // Proietta le vendite del mese corrente a fine mese
      if(i===0&&qty>0) qty=qty*monthRatio;
      if(qty>0){weightedSum+=qty*weights[i];weightSum+=weights[i];}
    });
    avgSales[p.id]=weightSum>0?weightedSum/weightSum:0;
  });

  const h=parseInt(horizon);

  // Funzione per trovare il fornitore di un prodotto
  const getSupplierForProduct=(p)=>{
    if(p.distributorId){return suppliers.find(s=>s.id===p.distributorId)||null;}
    const sup=suppliers.find(s=>s.brands&&s.brands.some(b=>p.supplier&&p.supplier.toLowerCase().includes(b.toLowerCase())));
    return sup||null;
  };

  // Calcola fabbisogno per ogni prodotto
  const allNeeds=products.map(p=>{
    const avg=avgSales[p.id]||0;
    const stockZero=p.stock===0;
    const daysOfStock=avg>0?(p.stock/(avg/30)):stockZero?0:999;
    // Se stock=0 ordina almeno 1 unità anche senza storico vendite, altrimenti usa la media
    const needed=avg>0?Math.ceil(avg*h):(stockZero?1:0);
    const toOrder=Math.max(0,needed-p.stock);
    const cost=toOrder*p.buyPrice;
    const sup=getSupplierForProduct(p);
    // Urgenza: CRITICO se stock=0, URGENTE se <30gg, MEDIO se <60gg, OK altrimenti
    const urgency=stockZero?4:daysOfStock<30?3:daysOfStock<60?2:1;
    return{...p,avg:avg.toFixed(1),needed,toOrder,cost,supplier:sup,daysOfStock:Math.round(daysOfStock),urgency,stockZero};
  }).filter(p=>p.toOrder>0);

  // Raggruppa per fornitore
  const grouped={};
  const noSupplier=[];
  allNeeds.forEach(p=>{
    if(p.supplier){
      const k=p.supplier.id;
      if(!grouped[k])grouped[k]={supplier:p.supplier,items:[],total:0};
      grouped[k].items.push(p);
      grouped[k].total+=p.cost;
    } else noSupplier.push(p);
  });

  // Per ogni gruppo: se sotto minimo, aggiungi i prodotti più venduti fino a raggiungere il minimo (senza sforare budget)
  let budgetUsed=0;
  const supplierGroups=Object.values(grouped).map(g=>{
    const minOrder=g.supplier.minOrder||0;
    let total=g.total;
    let topUp=[];
    // Se sotto minimo, cerca prodotti da aggiungere (quelli con avg>0 non già nell'ordine)
    if(total<minOrder&&minOrder>0){
      const alreadyIds=new Set(g.items.map(i=>i.id));
      const candidates=products
        .filter(p=>getSupplierForProduct(p)?.id===g.supplier.id&&!alreadyIds.has(p.id)&&(avgSales[p.id]||0)>0)
        .sort((a,b)=>(avgSales[b.id]||0)-(avgSales[a.id]||0));
      for(const c of candidates){
        if(total>=minOrder)break;
        const avg=avgSales[c.id]||0;
        const extraQty=Math.ceil(avg*h);
        const extraCost=extraQty*c.buyPrice;
        if(extraCost>0){
          topUp.push({...c,avg:avg.toFixed(1),toOrder:extraQty,cost:extraCost,isTopUp:true});
          total+=extraCost;
        }
      }
    }
    const allItems=[...g.items,...topUp].sort((a,b)=>b.urgency-a.urgency||(b.cost-a.cost));
    const reachesMin=total>=minOrder||minOrder===0;
    const fitsbudget=budgetUsed+total<=settings.budget;
    if(fitsbudget)budgetUsed+=total;
    return{...g,items:allItems,total,topUpCount:topUp.length,reachesMin,fitsbudget};
  }).sort((a,b)=>{
    // Priorità: urgenza media più alta prima
    const urgA=a.items.reduce((s,i)=>s+i.urgency,0)/a.items.length;
    const urgB=b.items.reduce((s,i)=>s+i.urgency,0)/b.items.length;
    return urgB-urgA;
  });

  const grandTotal=supplierGroups.reduce((a,g)=>a+g.total,0)+(noSupplier.reduce((a,p)=>a+p.cost,0));
  const budgetLeft=settings.budget-grandTotal;

  const toggle=(id)=>setExpandedSup(prev=>({...prev,[id]:!prev[id]}));

  return(
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      {/* Parametri */}
      <div style={{background:"#231A12",border:"1px solid #3D2E1E",borderRadius:12,padding:16,display:"flex",gap:16,flexWrap:"wrap",alignItems:"flex-end"}}>
        <div style={{flex:1,minWidth:200}}>
          <div style={{fontSize:14,fontWeight:700,color:"#D96C05",marginBottom:10}}>⚙️ Parametri ordine</div>
          <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              <label style={{fontSize:11,color:"#A08060"}}>Orizzonte</label>
              <select value={horizon} onChange={e=>setHorizon(e.target.value)} style={{...iStyle,minWidth:180}}>
                <option value="1">Copertura 1 mese</option>
                <option value="2">Copertura 2 mesi</option>
              </select>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              <label style={{fontSize:11,color:"#A08060"}}>Budget disponibile €</label>
              <div style={{display:"flex",gap:6}}>
                <input type="number" value={budget} onChange={e=>setBudget(e.target.value)} style={{...iStyle,width:120}}/>
                <button onClick={saveBudget} style={{background:"#D96C05",color:"white",border:"none",borderRadius:8,padding:"8px 12px",fontSize:12,cursor:"pointer"}}>Salva</button>
              </div>
            </div>
          </div>
        </div>
        <div style={{display:"flex",gap:20,flexWrap:"wrap"}}>
          <div style={{textAlign:"center"}}><div style={{fontSize:11,color:"#A08060"}}>Totale ordini</div><div style={{fontSize:22,fontWeight:800,color:"#D96C05"}}>{fmt(grandTotal)}</div></div>
          <div style={{textAlign:"center"}}><div style={{fontSize:11,color:"#A08060"}}>Budget rimasto</div><div style={{fontSize:22,fontWeight:800,color:budgetLeft>=0?"#5CB85C":"#E05252"}}>{fmt(budgetLeft)}</div></div>
          <div style={{textAlign:"center"}}><div style={{fontSize:11,color:"#A08060"}}>Fornitori coinvolti</div><div style={{fontSize:22,fontWeight:800,color:"#F5EDE3"}}>{supplierGroups.length}</div></div>
        </div>
      </div>

      {/* Legenda urgenza */}
      <div style={{display:"flex",gap:12,fontSize:11,color:"#A08060",flexWrap:"wrap"}}>
        <span>🆘 Stock ZERO</span>
        <span>🔴 Urgente (&lt;30gg stock)</span>
        <span>🟡 Medio (30-60gg)</span>
        <span>🟢 Ok (&gt;60gg)</span>
        <span>📦 Aggiunto per raggiungere minimo ordine</span>
      </div>

      {/* DEBUG PANEL */}
      {(()=>{
        const [showDebug,setShowDebug]=React.useState(false);
        const [debugSearch,setDebugSearch]=React.useState("");
        const debugProducts=products.filter(p=>debugSearch?p.name.toLowerCase().includes(debugSearch.toLowerCase()):true).slice(0,20).map(p=>{
          const months=lastMonths.map((m,i)=>{
            const raw=salesMaps[i][p.id]?.qty||0;
            const projected=i===0&&raw>0?+(raw*monthRatio).toFixed(1):raw;
            return{month:m,raw,projected,weight:weights[i]};
          });
          const hasAnySales=months.some(m=>m.raw>0);
          return{...p,months,avg:+(avgSales[p.id]||0).toFixed(2),hasAnySales};
        });
        return(
          <div style={{background:"#1A1410",border:"1px dashed #3D2E1E",borderRadius:10,padding:12}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:showDebug?10:0}}>
              <button onClick={()=>setShowDebug(d=>!d)} style={{background:"#3D2E1E",color:"#A08060",border:"none",borderRadius:6,padding:"4px 12px",fontSize:12,cursor:"pointer"}}>
                🔍 {showDebug?"Nascondi":"Mostra"} pannello diagnostica vendite
              </button>
              <span style={{fontSize:11,color:"#A08060"}}>Mesi analizzati: {lastMonths.join(", ")} · Oggi: giorno {daysPassed}/{daysInMonth} · Proiezione ×{monthRatio.toFixed(2)}</span>
            </div>
            {showDebug&&(
              <div>
                <input value={debugSearch} onChange={e=>setDebugSearch(e.target.value)} placeholder="Cerca prodotto per nome..." style={{...iStyle,marginBottom:8,fontSize:12}}/>
                <div style={{overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                    <thead>
                      <tr style={{color:"#A08060",borderBottom:"1px solid #3D2E1E"}}>
                        <th style={{textAlign:"left",padding:"4px 8px"}}>Prodotto</th>
                        {lastMonths.map((m,i)=><th key={m} style={{textAlign:"right",padding:"4px 8px"}}>{m}<br/>(raw/proj)</th>)}
                        <th style={{textAlign:"right",padding:"4px 8px"}}>Media</th>
                        <th style={{textAlign:"right",padding:"4px 8px"}}>Stock</th>
                        <th style={{textAlign:"right",padding:"4px 8px"}}>Da ord.</th>
                      </tr>
                    </thead>
                    <tbody>
                      {debugProducts.map(p=>{
                        const needed=p.avg>0?Math.ceil(p.avg*h):p.stock===0?1:0;
                        const toOrd=Math.max(0,needed-p.stock);
                        return(
                          <tr key={p.id} style={{borderBottom:"1px solid #1A1410",background:p.hasAnySales?"#1E2A1E":"transparent"}}>
                            <td style={{padding:"4px 8px",color:p.hasAnySales?"#F5EDE3":"#A08060"}}>{p.name}</td>
                            {p.months.map((m,i)=>(
                              <td key={i} style={{textAlign:"right",padding:"4px 8px",color:m.raw>0?"#5CB85C":"#A08060"}}>
                                {m.raw>0?`${m.raw}/${m.projected}`:"—"}
                              </td>
                            ))}
                            <td style={{textAlign:"right",padding:"4px 8px",color:"#D96C05",fontWeight:700}}>{p.avg}</td>
                            <td style={{textAlign:"right",padding:"4px 8px",color:p.stock===0?"#E05252":"#F5EDE3"}}>{p.stock}</td>
                            <td style={{textAlign:"right",padding:"4px 8px",color:toOrd>0?"#D96C05":"#A08060",fontWeight:toOrd>0?700:400}}>{toOrd>0?toOrd:"—"}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
                <div style={{fontSize:10,color:"#A08060",marginTop:6}}>Mostrando max 20 prodotti. I prodotti con vendite sono evidenziati in verde.</div>
              </div>
            )}
          </div>
        );
      })()}

      {/* Gruppi per fornitore */}
      {supplierGroups.length===0&&noSupplier.length===0&&(
        <div style={{color:"#A08060",textAlign:"center",padding:30,fontSize:14}}>Nessun riordino necessario o dati di vendita insufficienti.</div>
      )}

      {supplierGroups.map(g=>{
        const minOrder=g.supplier.minOrder||0;
        const pct=minOrder>0?Math.min(100,(g.total/minOrder)*100):100;
        const isOpen=expandedSup[g.supplier.id]!==false; // aperto di default
        const borderColor=!g.reachesMin?"#7A3B0A":!g.fitsbudget?"#5A3A8A":"#2E5E2E";
        const bgColor=!g.reachesMin?"#2E1A0E":!g.fitsbudget?"#1E1A2E":"#1E2E1E";
        return(
          <div key={g.supplier.id} style={{background:bgColor,border:"1px solid "+borderColor,borderRadius:12,overflow:"hidden"}}>
            {/* Header fornitore */}
            <div onClick={()=>toggle(g.supplier.id)} style={{padding:"12px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:12}}>
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                  <span style={{fontSize:15,fontWeight:800}}>{g.supplier.name}</span>
                  {!g.reachesMin&&<span style={{background:"#7A3B0A",color:"#F28C35",borderRadius:20,padding:"2px 8px",fontSize:10,fontWeight:700}}>⚠️ SOTTO MINIMO</span>}
                  {g.reachesMin&&!g.fitsbudget&&<span style={{background:"#3D2E1E",color:"#E05252",borderRadius:20,padding:"2px 8px",fontSize:10,fontWeight:700}}>⛔ FUORI BUDGET</span>}
                  {g.reachesMin&&g.fitsbudget&&<span style={{background:"#1E3A1E",color:"#5CB85C",borderRadius:20,padding:"2px 8px",fontSize:10,fontWeight:700}}>✅ OK</span>}
                  {g.topUpCount>0&&<span style={{background:"#231A12",color:"#A08060",borderRadius:20,padding:"2px 8px",fontSize:10}}>+{g.topUpCount} aggiunti per minimo</span>}
                </div>
                {/* Barra progresso verso minimo */}
                {minOrder>0&&(
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{flex:1,background:"#1A1410",borderRadius:20,height:6,overflow:"hidden"}}>
                      <div style={{background:g.reachesMin?"#5CB85C":"#D96C05",height:"100%",width:pct+"%",borderRadius:20,transition:"width 0.5s"}}/>
                    </div>
                    <span style={{fontSize:11,color:"#A08060",whiteSpace:"nowrap"}}>{fmt(g.total)} / {fmt(minOrder)} min.</span>
                  </div>
                )}
                {minOrder===0&&<span style={{fontSize:11,color:"#5CB85C"}}>Nessun minimo d'ordine</span>}
              </div>
              <div style={{textAlign:"right",minWidth:80}}>
                <div style={{fontSize:18,fontWeight:900,color:"#D96C05"}}>{fmt(g.total)}</div>
                <div style={{fontSize:11,color:"#A08060"}}>{g.items.length} prodotti</div>
              </div>
              <div style={{fontSize:18,color:"#A08060"}}>{isOpen?"▲":"▼"}</div>
            </div>

            {/* Lista prodotti del fornitore */}
            {isOpen&&(
              <div style={{borderTop:"1px solid "+borderColor,padding:"8px 16px 12px"}}>
                {g.items.map(p=>{
                  const urg=p.urgency===4?"🆘":p.urgency===3?"🔴":p.urgency===2?"🟡":"🟢";
                  return(
                    <div key={p.id} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 0",borderBottom:"1px solid #1A1410"}}>
                      <span style={{fontSize:13}}>{urg}</span>
                      <div style={{flex:1}}>
                        <div style={{fontSize:12,fontWeight:p.isTopUp?400:600,color:p.isTopUp?"#A08060":"#F5EDE3"}}>
                          {p.isTopUp?"📦 ":""}{p.name}
                        </div>
                        <div style={{fontSize:10,color:"#A08060"}}>
                          Media: {p.avg}/mese · Stock: {p.stock} · {p.stockZero?"⚠️ ESAURITO":p.daysOfStock<999?p.daysOfStock+"gg rimanenti":"nessuna vendita"}
                        </div>
                      </div>
                      <div style={{textAlign:"right",minWidth:80}}>
                        <div style={{fontSize:12,fontWeight:700}}>Ordina: {p.toOrder} pz</div>
                        <div style={{fontSize:11,color:"#E8C44A"}}>{fmt(p.cost)}</div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      })}

      {/* Prodotti senza fornitore */}
      {noSupplier.length>0&&(
        <div style={{background:"#231A12",border:"1px solid #3D2E1E",borderRadius:12,overflow:"hidden"}}>
          <div style={{padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontSize:14,fontWeight:700,color:"#A08060"}}>⚠️ Prodotti senza fornitore assegnato</div>
              <div style={{fontSize:11,color:"#A08060",marginTop:2}}>Assegna il fornitore nella tab Prodotti o Fornitori</div>
            </div>
            <div style={{fontSize:16,fontWeight:800,color:"#D96C05"}}>{fmt(noSupplier.reduce((a,p)=>a+p.cost,0))}</div>
          </div>
          <div style={{borderTop:"1px solid #3D2E1E",padding:"8px 16px 12px"}}>
            {noSupplier.map(p=>(
              <div key={p.id} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid #1A1410",fontSize:12}}>
                <span>{p.name}</span>
                <span style={{color:"#A08060",paddingRight:10}}>×{p.toOrder}</span>
                <span style={{color:"#E8C44A",fontWeight:600}}>{fmt(p.cost)}</span>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── FORNITORI ────────────────────────────────────────────────────────────────
function Fornitori({suppliers,setSuppliers,products,setProducts}){
  const empty={name:"",minOrder:"",brands:""};
  const [form,setForm]=useState(empty);
  const [editId,setEditId]=useState(null);
  const [selSup,setSelSup]=useState(null);

  const handleSave=()=>{
    if(!form.name)return;
    const entry={name:form.name,minOrder:parseFloat(form.minOrder)||0,brands:form.brands?form.brands.split(",").map(b=>b.trim()).filter(Boolean):[]};
    if(editId){setSuppliers(prev=>prev.map(s=>s.id===editId?{...s,...entry}:s));setEditId(null);}
    else setSuppliers(prev=>[...prev,{...entry,id:uid()}]);
    setForm(empty);
  };

  const startEdit=(s)=>{setForm({name:s.name,minOrder:s.minOrder.toString(),brands:(s.brands||[]).join(", ")});setEditId(s.id);};

  // Assegna fornitore a prodotto
  const assignSupplier=(productId,supplierId)=>{
    setProducts(prev=>prev.map(p=>p.id===productId?{...p,distributorId:supplierId||null}:p));
  };

  // Trova fornitore automatico per prodotto
  const autoSupplier=(p)=>{
    if(p.distributorId)return suppliers.find(s=>s.id===p.distributorId);
    return suppliers.find(s=>s.brands&&s.brands.some(b=>p.supplier&&p.supplier.toLowerCase().includes(b.toLowerCase())));
  };

  const unassigned=products.filter(p=>!autoSupplier(p));

  return(
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      {/* Form */}
      <div style={{background:"#231A12",border:"1px solid #3D2E1E",borderRadius:12,padding:16}}>
        <div style={{fontSize:14,fontWeight:700,color:"#D96C05",marginBottom:12}}>{editId?"✏️ Modifica Fornitore":"➕ Nuovo Fornitore"}</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 2fr auto",gap:10,alignItems:"flex-end"}}>
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            <label style={{fontSize:11,color:"#A08060"}}>Nome fornitore *</label>
            <input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="es. Global Pet" style={iStyle}/>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            <label style={{fontSize:11,color:"#A08060"}}>Minimo ordine €</label>
            <input type="number" value={form.minOrder} onChange={e=>setForm(f=>({...f,minOrder:e.target.value}))} placeholder="0 = nessun minimo" style={iStyle}/>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            <label style={{fontSize:11,color:"#A08060"}}>Brand associati (separati da virgola)</label>
            <input value={form.brands} onChange={e=>setForm(f=>({...f,brands:e.target.value}))} placeholder="es. Welldog, Primordial" style={iStyle}/>
          </div>
          <div style={{display:"flex",gap:6}}>
            <button onClick={handleSave} style={{background:"#D96C05",color:"white",border:"none",borderRadius:8,padding:"9px 14px",fontSize:13,fontWeight:700,cursor:"pointer"}}>{editId?"Salva":"Aggiungi"}</button>
            {editId&&<button onClick={()=>{setForm(empty);setEditId(null);}} style={{background:"#3D2E1E",color:"#F5EDE3",border:"none",borderRadius:8,padding:"9px 10px",fontSize:13,cursor:"pointer"}}>✕</button>}
          </div>
        </div>
      </div>

      {/* Lista fornitori */}
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {suppliers.map(s=>{
          const prodCount=products.filter(p=>autoSupplier(p)?.id===s.id).length;
          return(
            <div key={s.id} style={{background:"#231A12",border:"1px solid #3D2E1E",borderRadius:10,padding:"10px 14px",display:"flex",alignItems:"center",gap:12}}>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:700}}>{s.name}</div>
                <div style={{fontSize:11,color:"#A08060"}}>
                  Minimo: {s.minOrder>0?fmt(s.minOrder):"Nessun minimo"} · {prodCount} prodotti · Brand: {(s.brands||[]).join(", ")||"—"}
                </div>
              </div>
              <div style={{display:"flex",gap:4}}>
                <button onClick={()=>startEdit(s)} style={{background:"#3D2E1E",border:"none",color:"#D96C05",borderRadius:6,padding:"5px 8px",cursor:"pointer"}}>✏️</button>
                <button onClick={()=>setSuppliers(prev=>prev.filter(x=>x.id!==s.id))} style={{background:"#3D2E1E",border:"none",color:"#E05252",borderRadius:6,padding:"5px 8px",cursor:"pointer"}}>🗑</button>
              </div>
            </div>
          );
        })}
      </div>

      {/* Prodotti senza fornitore */}
      {unassigned.length>0&&(
        <div style={{background:"#231A12",border:"1px solid #3D2E1E",borderRadius:12,padding:16}}>
          <div style={{fontSize:13,fontWeight:700,color:"#E8C44A",marginBottom:10}}>⚠️ {unassigned.length} prodotti senza fornitore — assegna manualmente</div>
          <div style={{maxHeight:300,overflowY:"auto",display:"flex",flexDirection:"column",gap:4}}>
            {unassigned.map(p=>(
              <div key={p.id} style={{display:"flex",alignItems:"center",gap:10,padding:"6px 0",borderBottom:"1px solid #3D2E1E"}}>
                <div style={{flex:1,fontSize:12}}>{p.name} <span style={{color:"#A08060"}}>({p.category})</span></div>
                <select value={p.distributorId||""} onChange={e=>assignSupplier(p.id,e.target.value)} style={{...iStyle,width:160,padding:"4px 8px",fontSize:12}}>
                  <option value="">-- Seleziona --</option>
                  {suppliers.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
                </select>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── REPORT ──────────────────────────────────────────────────────────────────
function Report({products,sales,expenses,getSalesByProduct}){
  const [selMonth,setSelMonth]=useState(thisMonth());
  const months=[...new Set([thisMonth(),...sales.map(s=>s.date.slice(0,7)),...expenses.map(e=>e.month)])].sort().reverse();
  const salesMap=getSalesByProduct(selMonth);
  const monthSales=sales.filter(s=>s.date.startsWith(selMonth));
  const monthExpenses=expenses.filter(e=>e.month===selMonth);
  let totalLordo=0,totalImponibile=0,totalIva22=0,totalIva10=0,totalCostGoods=0,totalSconti=0;
  monthSales.forEach(s=>{
    const lordo=s.finalPrice||s.qty*s.sellPrice;
    const {imponibile,iva}=scorporaIva(lordo,s.iva||22);
    totalLordo+=lordo;totalImponibile+=imponibile;
    if((s.iva||22)===10)totalIva10+=iva;else totalIva22+=iva;
    totalCostGoods+=s.qty*s.buyPrice;
    totalSconti+=(s.discountAmount||0);
  });
  const totalIva=totalIva22+totalIva10;
  const grossMargin=totalImponibile-totalCostGoods;
  const totalExpenses=monthExpenses.reduce((a,e)=>a+e.amount,0);
  const netResult=grossMargin-totalExpenses;
  const marginPct=totalImponibile>0?(grossMargin/totalImponibile*100).toFixed(1):0;
  const productBreakdown=Object.entries(salesMap).map(([id,d])=>({product:products.find(p=>p.id===id),...d})).filter(x=>x.product).sort((a,b)=>b.revenue-a.revenue);
  const stockValue=products.reduce((a,p)=>a+p.stock*p.buyPrice,0);
  const stockRetailValue=products.reduce((a,p)=>a+p.stock*p.sellPrice,0);
  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div style={{display:"flex",gap:10,alignItems:"center"}}>
        <label style={{fontSize:12,color:"#A08060"}}>Mese:</label>
        <select value={selMonth} onChange={e=>setSelMonth(e.target.value)} style={{...iStyle,minWidth:140}}>{months.map(m=><option key={m}>{m}</option>)}</select>
      </div>
      <div style={{background:"#231A12",border:"1px solid #3D2E1E",borderRadius:12,padding:16}}>
        <div style={{fontSize:14,fontWeight:700,color:"#D96C05",marginBottom:12}}>📊 Conto Economico — {selMonth}</div>
        {[
          {label:"Incassato (IVA inclusa)",value:fmt(totalLordo),color:"#D96C05"},
          {label:"IVA collettata",value:"- "+fmt(totalIva),color:"#A78BFA"},
          {label:"Fatturato netto (imponibile)",value:fmt(totalImponibile),color:"#F28C35",bold:true},
          {label:"Costo del venduto",value:"- "+fmt(totalCostGoods),color:"#E05252"},
          ...(totalSconti>0?[{label:"Sconti applicati",value:fmt(totalSconti),color:"#E05252"}]:[]),
          {label:"Margine lordo",value:fmt(grossMargin)+" ("+marginPct+"%)",color:grossMargin>=0?"#5CB85C":"#E05252",bold:true},
          {label:"Spese fisse",value:"- "+fmt(totalExpenses),color:"#E8C44A"},
          {label:"Risultato netto",value:fmt(netResult),color:netResult>=0?"#5CB85C":"#E05252",bold:true,big:true},
        ].map((row,i,arr)=>(
          <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:i<arr.length-1?"1px solid #3D2E1E":"none"}}>
            <span style={{fontSize:row.big?15:13,fontWeight:row.bold?700:400}}>{row.label}</span>
            <span style={{fontSize:row.big?16:13,fontWeight:row.bold?800:600,color:row.color}}>{row.value}</span>
          </div>
        ))}
      </div>
      <div style={{background:"#231A12",border:"1px solid #3D2E1E",borderRadius:12,padding:16}}>
        <div style={{fontSize:14,fontWeight:700,color:"#A78BFA",marginBottom:10}}>🏛️ Riepilogo IVA</div>
        <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
          {totalIva22>0&&<div style={{flex:1,minWidth:120,background:"#1A1410",borderRadius:8,padding:"10px 12px"}}><div style={{fontSize:11,color:"#A08060"}}>IVA 22%</div><div style={{fontSize:18,fontWeight:800,color:"#A78BFA"}}>{fmt(totalIva22)}</div></div>}
          {totalIva10>0&&<div style={{flex:1,minWidth:120,background:"#1A1410",borderRadius:8,padding:"10px 12px"}}><div style={{fontSize:11,color:"#A08060"}}>IVA 10% (BARF)</div><div style={{fontSize:18,fontWeight:800,color:"#A78BFA"}}>{fmt(totalIva10)}</div></div>}
          <div style={{flex:1,minWidth:120,background:"#1A1410",borderRadius:8,padding:"10px 12px"}}><div style={{fontSize:11,color:"#A08060"}}>Totale da versare</div><div style={{fontSize:18,fontWeight:800,color:"#A78BFA"}}>{fmt(totalIva)}</div></div>
        </div>
      </div>
      {productBreakdown.length>0&&(
        <div style={{background:"#231A12",border:"1px solid #3D2E1E",borderRadius:12,padding:16}}>
          <div style={{fontSize:14,fontWeight:700,color:"#D96C05",marginBottom:10}}>🏷️ Vendite per Prodotto</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr auto auto auto auto",gap:"4px 12px",fontSize:11,color:"#A08060",marginBottom:6}}><span>Prodotto</span><span style={{textAlign:"right"}}>Qtà</span><span style={{textAlign:"right"}}>IVA</span><span style={{textAlign:"right"}}>Ricavo netto</span><span style={{textAlign:"right"}}>Margine</span></div>
          {productBreakdown.map(({product,qty,revenue:rev,cost})=>{
            const iva=product.iva||22;const rn=rev/(1+iva/100);const cn=cost/(1+iva/100);
            return(<div key={product.id} style={{display:"grid",gridTemplateColumns:"1fr auto auto auto auto",gap:"4px 12px",padding:"6px 0",borderBottom:"1px solid #3D2E1E",fontSize:12}}><span>{product.name}</span><span style={{textAlign:"right",color:"#A08060"}}>{qty}</span><span style={{textAlign:"right",color:"#A78BFA"}}>{iva}%</span><span style={{textAlign:"right",color:"#D96C05",fontWeight:600}}>{fmt(rn)}</span><span style={{textAlign:"right",color:"#5CB85C",fontWeight:600}}>{fmt(rn-cn)}</span></div>);
          })}
        </div>
      )}
      <div style={{background:"#231A12",border:"1px solid #3D2E1E",borderRadius:12,padding:16}}>
        <div style={{fontSize:14,fontWeight:700,color:"#D96C05",marginBottom:10}}>📦 Valore Magazzino</div>
        <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
          <div style={{flex:1,minWidth:120,background:"#1A1410",borderRadius:8,padding:"10px 12px"}}><div style={{fontSize:11,color:"#A08060"}}>Costo acquisto</div><div style={{fontSize:18,fontWeight:800,color:"#E8C44A"}}>{fmt(stockValue)}</div></div>
          <div style={{flex:1,minWidth:120,background:"#1A1410",borderRadius:8,padding:"10px 12px"}}><div style={{fontSize:11,color:"#A08060"}}>Valore vendita</div><div style={{fontSize:18,fontWeight:800,color:"#D96C05"}}>{fmt(stockRetailValue)}</div></div>
          <div style={{flex:1,minWidth:120,background:"#1A1410",borderRadius:8,padding:"10px 12px"}}><div style={{fontSize:11,color:"#A08060"}}>Margine potenziale</div><div style={{fontSize:18,fontWeight:800,color:"#5CB85C"}}>{fmt(stockRetailValue-stockValue)}</div></div>
        </div>
      </div>
    </div>
  );
}

// ─── BACKUP / RIPRISTINO ─────────────────────────────────────────────────────
function Backup({products,sales,expenses,settings,setProducts,setSales,setExpenses,setSettings}){
  const [restoreMsg,setRestoreMsg]=useState(null);
  const fileRef=useRef(null);

  const doExport=()=>{
    const data={version:2,exportDate:nowISO(),products,sales,expenses,settings};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download="backup-apassodicoda-"+new Date().toISOString().slice(0,10)+".json";
    a.click();URL.revokeObjectURL(url);
  };

  const doImport=(e)=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(!data.products||!data.sales)throw new Error("File non valido");
        setProducts(data.products||[]);
        setSales(data.sales||[]);
        setExpenses(data.expenses||[]);
        setSettings(data.settings||{budget:2000});
        setRestoreMsg({text:"✅ Dati ripristinati con successo! ("+data.products.length+" prodotti, "+data.sales.length+" vendite)",type:"ok"});
      }catch(err){setRestoreMsg({text:"❌ Errore: file non valido o corrotto.",type:"err"});}
    };
    reader.readAsText(file);
    e.target.value="";
  };

  // Statistiche backup
  const lastSaleDate=sales.length>0?new Date([...sales].sort((a,b)=>b.date.localeCompare(a.date))[0].date).toLocaleDateString("it-IT"):"—";

  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div style={{background:"#231A12",border:"1px solid #3D2E1E",borderRadius:12,padding:16}}>
        <div style={{fontSize:14,fontWeight:700,color:"#D96C05",marginBottom:4}}>💾 Backup & Ripristino Dati</div>
        <div style={{fontSize:12,color:"#A08060",marginBottom:16}}>Esporta tutti i dati in un file JSON da conservare. Potrai reimportarlo su qualsiasi PC o dopo aver pulito la cache.</div>

        {/* Riepilogo dati */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10,marginBottom:16}}>
          {[["📦 Prodotti",products.length+" articoli"],["🛒 Vendite",sales.length+" registrazioni"],["💳 Spese",expenses.length+" voci"],["📅 Ultima vendita",lastSaleDate]].map(([label,val])=>(
            <div key={label} style={{background:"#1A1410",borderRadius:8,padding:"10px 12px"}}>
              <div style={{fontSize:11,color:"#A08060"}}>{label}</div>
              <div style={{fontSize:15,fontWeight:700}}>{val}</div>
            </div>
          ))}
        </div>

        <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
          <button onClick={doExport} style={{flex:1,minWidth:200,background:"#D96C05",color:"white",border:"none",borderRadius:10,padding:"14px",fontSize:15,fontWeight:700,cursor:"pointer"}}>
            📥 Esporta Backup
          </button>
          <button onClick={()=>fileRef.current?.click()} style={{flex:1,minWidth:200,background:"#2E2218",color:"#F5EDE3",border:"1px solid #3D2E1E",borderRadius:10,padding:"14px",fontSize:15,fontWeight:700,cursor:"pointer"}}>
            📤 Importa / Ripristina
          </button>
          <input ref={fileRef} type="file" accept=".json" onChange={doImport} style={{display:"none"}}/>
        </div>

        {restoreMsg&&<div style={{marginTop:12,padding:"10px 14px",borderRadius:8,background:restoreMsg.type==="ok"?"#1E3A1E":"#3A1E1E",color:restoreMsg.type==="ok"?"#5CB85C":"#E05252",fontSize:13}}>{restoreMsg.text}</div>}
      </div>

      <div style={{background:"#231A12",border:"1px solid #3D2E1E",borderRadius:12,padding:16}}>
        <div style={{fontSize:13,fontWeight:700,color:"#E8C44A",marginBottom:8}}>⚠️ Quando fare il backup</div>
        <div style={{fontSize:13,color:"#A08060",lineHeight:1.7}}>
          • <strong style={{color:"#F5EDE3"}}>Ogni settimana</strong> come routine<br/>
          • Prima di aggiornare il gestionale con una nuova versione<br/>
          • Prima di pulire la cache del browser<br/>
          • Quando cambi PC o dispositivo<br/>
          • Salva il file JSON in una cartella su Google Drive o simile per averlo sempre disponibile
        </div>
      </div>
    </div>
  );
}

const REWARDS=[
  {points:100,label:"Sconto €2",value:2,type:"discount"},
  {points:200,label:"Sconto €5",value:5,type:"discount"},
  {points:300,label:"Sconto €10",value:10,type:"discount"},
  {points:500,label:"Prodotto omaggio fino a €8",value:8,type:"gift"},
  {points:1000,label:"Sconto €30 o prodotto omaggio premium",value:30,type:"premium"},
];
const VIP_THRESHOLD=500;
const INACTIVITY_MONTHS=12;

const isVip=(customer)=>(customer.totalPointsEarned||0)>=VIP_THRESHOLD;
const pointsRate=(customer)=>isVip(customer)?1.5:1;
const isInactive=(customer)=>{
  if(!customer.lastActivity)return false;
  const months=(new Date()-new Date(customer.lastActivity))/(1000*60*60*24*30);
  return months>=INACTIVITY_MONTHS;
};
const activePoints=(customer)=>isInactive(customer)?0:(customer.points||0);
const nextReward=(pts)=>REWARDS.find(r=>r.points>pts)||null;

function ClienteDettaglio({c,onBack,handleRedeem,handleAddPoints,redeemMsg,sales}){
  const [manualAmt,setManualAmt]=useState("");
  const pts=activePoints(c);
  const vip=isVip(c);
  const inactive=isInactive(c);
  const next=nextReward(pts);
  const progress=next?Math.min(100,(pts/next.points)*100):100;
  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <button onClick={onBack} style={{background:"#3D2E1E",border:"none",color:"#F5EDE3",borderRadius:8,padding:"6px 14px",cursor:"pointer",fontSize:13}}>← Indietro</button>
        <div style={{fontSize:16,fontWeight:800}}>{c.firstName} {c.lastName}</div>
        {vip&&<span style={{background:"#D96C05",color:"white",borderRadius:20,padding:"2px 10px",fontSize:11,fontWeight:700}}>⭐ VIP</span>}

      </div>
      {redeemMsg&&<div style={{padding:"8px 14px",borderRadius:8,background:redeemMsg.type==="ok"?"#1E3A1E":"#3A1E1E",color:redeemMsg.type==="ok"?"#5CB85C":"#E05252",fontSize:13}}>{redeemMsg.text}</div>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:12}}>
        <div style={{background:"#231A12",border:"1px solid #3D2E1E",borderRadius:12,padding:14}}>
          <div style={{fontSize:11,color:"#A08060"}}>Punti disponibili</div>
          <div style={{fontSize:28,fontWeight:900,color:inactive?"#A08060":"#D96C05"}}>{inactive?"0*":pts}</div>
          {inactive&&<div style={{fontSize:10,color:"#E05252"}}>*azzerati per inattività</div>}

        </div>
        <div style={{background:"#231A12",border:"1px solid #3D2E1E",borderRadius:12,padding:14}}>
          <div style={{fontSize:11,color:"#A08060"}}>Moltiplicatore</div>
          <div style={{fontSize:28,fontWeight:900,color:vip?"#D96C05":"#F5EDE3"}}>×{pointsRate(c).toFixed(1)}</div>
          <div style={{fontSize:10,color:"#A08060"}}>{vip?"Cliente VIP":"Standard"}</div>
        </div>
        <div style={{background:"#231A12",border:"1px solid #3D2E1E",borderRadius:12,padding:14}}>
          <div style={{fontSize:11,color:"#A08060"}}>Iscritto dal</div>
          <div style={{fontSize:14,fontWeight:700,marginTop:4}}>{new Date(c.joinDate).toLocaleDateString("it-IT")}</div>
          <div style={{fontSize:11,color:"#A08060",marginTop:2}}>Ultima att.: {c.lastActivity?new Date(c.lastActivity).toLocaleDateString("it-IT"):"—"}</div>
        </div>
      </div>
      {!inactive&&next&&(
        <div style={{background:"#231A12",border:"1px solid #3D2E1E",borderRadius:12,padding:14}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:6}}>
            <span style={{color:"#A08060"}}>Prossimo premio: <strong style={{color:"#F5EDE3"}}>{next.label}</strong></span>
            <span style={{color:"#D96C05",fontWeight:700}}>{pts}/{next.points} pt</span>
          </div>
          <div style={{background:"#1A1410",borderRadius:20,height:10,overflow:"hidden"}}>
            <div style={{background:"linear-gradient(90deg,#D96C05,#F28C35)",height:"100%",width:progress+"%",borderRadius:20,transition:"width 0.5s"}}/>
          </div>
          <div style={{fontSize:11,color:"#A08060",marginTop:4}}>Mancano {next.points-pts} punti (~{fmt((next.points-pts)/pointsRate(c))} di acquisti)</div>
        </div>
      )}
      <div style={{background:"#231A12",border:"1px solid #3D2E1E",borderRadius:12,padding:14}}>
        <div style={{fontSize:13,fontWeight:700,color:"#D96C05",marginBottom:10}}>🎁 Riscatta Premio</div>
        <div style={{display:"flex",flexDirection:"column",gap:6}}>

                <button onClick={()=>handleRedeem(c,r)} disabled={!canRedeem}
                  style={{background:canRedeem?"#D96C05":"#3D2E1E",color:canRedeem?"white":"#A08060",border:"none",borderRadius:8,padding:"6px 14px",cursor:canRedeem?"pointer":"not-allowed",fontSize:12,fontWeight:700}}>
                  {canRedeem?"Riscatta":"🔒"}

            );
          })}

      </div>
      <div style={{background:"#231A12",border:"1px solid #3D2E1E",borderRadius:12,padding:14}}>
        <div style={{fontSize:13,fontWeight:700,color:"#D96C05",marginBottom:8}}>➕ Aggiungi punti manualmente</div>
        <div style={{display:"flex",gap:8}}>
          <input type="number" value={manualAmt} onChange={e=>setManualAmt(e.target.value)} placeholder="Importo spesa €" style={{...iStyle,flex:1}}/>
          <button onClick={()=>{handleAddPoints(c,parseFloat(manualAmt)||0);setManualAmt("");}} style={{background:"#D96C05",color:"white",border:"none",borderRadius:8,padding:"8px 16px",cursor:"pointer",fontWeight:700,fontSize:13}}>Aggiungi</button>
        </div>
        <div style={{fontSize:11,color:"#A08060",marginTop:4}}>Equivale a {Math.floor((parseFloat(manualAmt)||0)*pointsRate(c))} punti (×{pointsRate(c).toFixed(1)})</div>
      </div>
      <div style={{background:"#231A12",border:"1px solid #3D2E1E",borderRadius:12,padding:14}}>

        {(c.history||[]).length===0&&<div style={{color:"#A08060",fontSize:13}}>Nessuna attività ancora.</div>}
        {[...(c.history||[])].reverse().map((h,i)=>(
